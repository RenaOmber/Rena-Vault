<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#4f6ef7" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="RO Vault" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rena Omber — Research</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="theme.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #080c18; --bg2: #0e1420; --bg3: #141c2e;
      --border: rgba(99,130,255,0.08); --border-hover: rgba(99,130,255,0.22);
      --text: #e8eaf6; --text2: #8892b0; --text3: #3d4a63;
      --accent: #4f6ef7; --accent-dim: rgba(79,110,247,0.1);
      --green: #34d399; --yellow: #fbbf24; --red: #f87171;
      --sky: #38bdf8; --sky-dim: rgba(56,189,248,0.08);
    }
    html, body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; font-size: 14px; min-height: 100vh; }

    /* GATE */
    #gate { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; }
    .gate-mark { width: 32px; height: 2px; background: var(--sky); border-radius: 2px; margin: 0 auto 20px; }
    .gate-form { display: flex; gap: 8px; margin-top: 8px; }
    .gate-form input { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: inherit; font-size: 14px; padding: 11px 16px; width: 220px; outline: none; transition: border-color 0.15s; }
    .gate-form input:focus { border-color: var(--border-hover); }
    .gate-form button { background: var(--sky); border: none; border-radius: 8px; color: #fff; cursor: pointer; font-family: inherit; font-size: 13px; font-weight: 500; padding: 11px 20px; }
    .gate-error { font-size: 12px; color: var(--red); min-height: 16px; text-align: center; }

    /* MAIN */
    #main { display: none; }
    .top-bar { display: flex; align-items: center; justify-content: space-between; padding: 14px 32px; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: rgba(8,12,24,0.92); backdrop-filter: blur(12px); z-index: 10; }
    .top-left { display: flex; align-items: center; gap: 12px; }
    .top-mark { width: 18px; height: 2px; background: var(--sky); border-radius: 2px; }
    .top-name { font-size: 13px; font-weight: 600; letter-spacing: -0.01em; }
    .top-sub { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.1em; margin-top: 1px; }
    .top-right { display: flex; gap: 6px; align-items: center; }
    .btn-ghost { background: none; border: 1px solid var(--border); border-radius: 6px; color: var(--text3); cursor: pointer; font-family: inherit; font-size: 11px; padding: 5px 12px; text-decoration: none; display: inline-flex; align-items: center; gap: 4px; transition: all 0.15s; letter-spacing: 0.01em; }
    .btn-ghost:hover { border-color: var(--border-hover); color: var(--text2); }

    /* CONTENT */
    .content { padding: 32px 40px; max-width: 880px; }

    /* UPLOAD BOX */
    .upload-box { border: 1px solid var(--border); border-radius: 14px; margin-bottom: 28px; overflow: hidden; transition: border-color 0.2s; }
    .upload-box:hover { border-color: var(--border-hover); }
    .upload-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 22px; cursor: pointer; user-select: none; }
    .upload-header-left { display: flex; align-items: center; gap: 12px; }
    .upload-header-icon { font-size: 14px; opacity: 0.6; }
    .upload-header-title { font-size: 13px; font-weight: 600; letter-spacing: -0.01em; }
    .upload-header-sub { font-size: 11px; color: var(--text3); margin-top: 1px; }
    .upload-toggle-btn { font-size: 10px; color: var(--text3); transition: transform 0.2s; line-height: 1; opacity: 0.5; }
    .upload-toggle-btn.open { transform: rotate(180deg); }
    .upload-body { padding: 0 22px 22px; border-top: 1px solid var(--border); }
    .upload-body.hidden { display: none; }
    .upload-row { display: flex; gap: 8px; margin-top: 14px; flex-wrap: wrap; }
    .upload-input { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: inherit; font-size: 13px; padding: 9px 13px; outline: none; flex: 1; min-width: 130px; transition: border-color 0.15s; }
    .upload-input:focus { border-color: var(--border-hover); }
    .upload-select { cursor: pointer; }
    .type-toggle { display: flex; background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; flex-shrink: 0; }
    .type-btn { background: none; border: none; color: var(--text3); cursor: pointer; font-family: inherit; font-size: 11px; font-weight: 500; padding: 9px 14px; transition: background 0.15s, color 0.15s; letter-spacing: 0.02em; }
    .type-btn.active { background: var(--sky-dim); color: var(--sky); }
    .submit-btn { background: var(--sky); border: none; border-radius: 8px; color: #fff; cursor: pointer; font-family: inherit; font-size: 12px; font-weight: 600; padding: 9px 20px; flex-shrink: 0; transition: opacity 0.15s; white-space: nowrap; letter-spacing: 0.02em; }
    .submit-btn:hover { opacity: 0.85; }
    .submit-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .file-label { display: flex; align-items: center; gap: 8px; background: var(--bg2); border: 1px dashed var(--border-hover); border-radius: 8px; color: var(--text3); cursor: pointer; font-size: 12px; padding: 9px 14px; flex: 1; transition: border-color 0.15s, color 0.15s; min-width: 130px; }
    .file-label:hover { border-color: var(--sky); color: var(--text2); }

    /* FILTER BAR */
    .filter-bar { display: flex; align-items: center; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
    .filter-label { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.12em; }
    .filter-chip { background: transparent; border: 1px solid var(--border); border-radius: 20px; color: var(--text3); cursor: pointer; font-size: 11px; font-weight: 500; padding: 4px 12px; transition: all 0.15s; }
    .filter-chip:hover { border-color: var(--border-hover); color: var(--text2); }
    .filter-chip.active { background: var(--sky-dim); border-color: rgba(56,189,248,0.3); color: var(--sky); }
    .filter-search { background: transparent; border: 1px solid var(--border); border-radius: 20px; color: var(--text); font-family: inherit; font-size: 11px; padding: 5px 14px; outline: none; margin-left: auto; width: 160px; transition: border-color 0.15s; }
    .filter-search:focus { border-color: var(--border-hover); }
    .filter-search::placeholder { color: var(--text3); }

    /* RESEARCH GRID */
    .research-grid { display: flex; flex-direction: column; gap: 1px; background: var(--border); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; }
    .research-card { background: var(--bg); overflow: hidden; transition: background 0.15s; }
    .research-card:hover { background: var(--bg2); }
    .research-card-main { display: flex; align-items: center; gap: 16px; padding: 16px 20px; }
    .research-card-icon { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
    .research-card-body { flex: 1; min-width: 0; }
    .research-card-topic { font-size: 9px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.12em; margin-bottom: 3px; }
    .research-card-title { font-size: 13px; font-weight: 500; color: var(--text); word-break: break-word; line-height: 1.4; }
    .research-card-meta { font-size: 10px; color: var(--text3); margin-top: 3px; }
    .research-card-actions { display: flex; gap: 5px; flex-shrink: 0; align-items: center; }
    .action-btn { background: none; border: 1px solid var(--border); border-radius: 6px; color: var(--text3); cursor: pointer; font-size: 10px; padding: 4px 10px; transition: border-color 0.15s, color 0.15s; text-decoration: none; display: inline-flex; align-items: center; gap: 3px; font-family: inherit; white-space: nowrap; letter-spacing: 0.02em; }
    .action-btn:hover { border-color: var(--border-hover); color: var(--text2); }
    .action-btn.del:hover { border-color: rgba(248,113,113,0.3); color: var(--red); }
    .action-btn.primary { background: var(--sky-dim); border-color: rgba(56,189,248,0.2); color: var(--sky); }
    .action-btn.primary:hover { opacity: 0.8; }

    /* PDF VIEWER */
    .pdf-viewer { border-top: 1px solid var(--border); }
    .pdf-viewer iframe { width: 100%; height: 520px; border: none; display: block; }
    .pdf-viewer-bar { display: flex; align-items: center; justify-content: space-between; padding: 8px 20px; border-bottom: 1px solid var(--border); background: var(--bg2); }
    .pdf-viewer-label { font-size: 10px; color: var(--text3); letter-spacing: 0.04em; }

    /* EMPTY */
    .empty-state { text-align: center; padding: 64px 20px; color: var(--text3); font-size: 12px; letter-spacing: 0.04em; background: var(--bg); }

    /* TOAST */
    .toast { position: fixed; bottom: 24px; right: 24px; background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 12px 18px; font-size: 12px; z-index: 999; opacity: 0; transform: translateY(6px); transition: all 0.2s; pointer-events: none; letter-spacing: 0.02em; }
    .toast.show { opacity: 1; transform: translateY(0); }

    @media (max-width: 640px) {
      .content { padding: 16px; }
      .top-bar { padding: 10px 16px; }
      .research-card-main { flex-wrap: wrap; gap: 10px; }
      .research-card-actions { width: 100%; justify-content: flex-end; }
      .filter-search { width: 120px; }
    }
  </style>
</head>
<body>

<div id="gate">
  <div>
    <div class="gate-mark"></div>
    <div style="font-size:18px;font-weight:500;text-align:center;">Rena Omber</div>
    <div style="font-size:12px;color:var(--text3);letter-spacing:0.08em;text-transform:uppercase;text-align:center;margin-top:4px;">Research</div>
  </div>
  <div>
    <div class="gate-form">
      <input type="password" id="pw-input" placeholder="Password" onkeydown="if(event.key==='Enter')checkPw()" />
      <button onclick="checkPw()">Masuk</button>
    </div>
    <div class="gate-error" id="pw-error"></div>
  </div>
</div>

<div id="main">
  <div class="top-bar">
    <div class="top-left">
      <div class="top-mark"></div>
      <div>
        <div class="top-name">Rena Omber</div>
        <div class="top-sub">Research</div>
      </div>
    </div>
    <div class="top-right">
      <button class="theme-toggle-btn btn-ghost" onclick="toggleTheme()">☀️</button>
      <a href="index.html" class="btn-ghost">← Vault</a>
      <button class="btn-ghost" onclick="logout()">Keluar</button>
    </div>
  </div>

  <div class="content">

    <!-- UPLOAD BOX -->
    <div class="upload-box">
      <div class="upload-header" onclick="toggleUpload()">
        <div class="upload-header-left">
          <span class="upload-header-icon">📎</span>
          <div>
            <div class="upload-header-title">Tambah Referensi</div>
            <div class="upload-header-sub">Link atau PDF</div>
          </div>
        </div>
        <span class="upload-toggle-btn open" id="upload-toggle-icon">▲</span>
      </div>
      <div class="upload-body" id="upload-body">
        <div class="upload-row">
          <select class="upload-input upload-select" id="res-who" style="max-width:110px;">
            <option value="rena">rena</option>
            <option value="nom">nom</option>
            <option value="gapl">gapl</option>
            <option value="pix">pix</option>
            <option value="jee">jee</option>
            <option value="tok">tok</option>
          </select>
          <input class="upload-input" id="res-topic" placeholder="Topik (cth: Competitor, Packaging...)" style="flex:3;" />
          <div class="type-toggle">
            <button class="type-btn active" id="res-btn-link" onclick="setResType('link')">🔗 Link</button>
            <button class="type-btn" id="res-btn-pdf" onclick="setResType('pdf')">📄 PDF</button>
          </div>
        </div>
        <!-- LINK INPUT -->
        <div class="upload-row" id="res-link-row">
          <input class="upload-input" id="res-title" placeholder="Judul referensi" style="flex:2;" />
          <input class="upload-input" id="res-url" placeholder="https://..." style="flex:3;" onkeydown="if(event.key==='Enter')submitResearch()" />
          <button class="submit-btn" id="res-submit-link" onclick="submitResearch()">Upload</button>
        </div>
        <!-- PDF INPUT -->
        <div class="upload-row" id="res-pdf-row" style="display:none;">
          <input class="upload-input" id="res-title-pdf" placeholder="Judul referensi" style="flex:2;" />
          <label class="file-label">
            <span>📎</span>
            <span id="res-file-name">Pilih PDF...</span>
            <input type="file" accept=".pdf" style="display:none;" id="res-file" onchange="document.getElementById('res-file-name').textContent=this.files[0]?.name||'Pilih PDF...'" />
          </label>
          <button class="submit-btn" id="res-submit-pdf" onclick="submitResearchPdf()">Upload</button>
        </div>
      </div>
    </div>

    <!-- FILTER BAR -->
    <div class="filter-bar">
      <span class="filter-label">Topik:</span>
      <div id="topic-chips" style="display:flex;gap:6px;flex-wrap:wrap;"></div>
      <input class="filter-search" id="search-input" placeholder="Cari..." oninput="renderList()" />
    </div>

    <!-- LIST -->
    <div class="research-grid" id="research-list"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  // ─── CONFIG ────────────────────────────────────────────────
  const SUPABASE_URL    = 'https://fqvfnohhilkzvijqukfg.supabase.co';
  const SUPABASE_ANON   = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZxdmZub2hoaWxrenZpanF1a2ZnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI1NDU4NjAsImV4cCI6MjA5ODEyMTg2MH0.er10SEsmDlnx1yRLGJK2fKtLhQR40vFOXVJzH9yakCg';
  const PUBLISHABLE_KEY = 'sb_publishable_guNzoa22ChBWwGo6w_JqgA_9makz2Yl'; // Supabase → Settings → API → Publishable key
  const PASSWORD_HASH   = '3f0e57f3e719957119f0ba621629a3ae0ed1ec95d1ad8a91bd980b2896b679e4';
  const VAPID_PUBLIC    = 'BHBEXCaqxtUm-t_L-qxw0Zr2qzv6kVD2eRa2KS6tNC3sOXwoDh4u3DEd-KyUBD6TuaUBIjOf-DdFitLMspD16lk';
  const RESEARCH_BUCKET = 'research-docs';
  const MEMBERS = ['rena','nom','gapl','pix','jee','tok'];
  // ───────────────────────────────────────────────────────────

  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);
  let allResearch = [];
  let activeTopicFilter = null;
  let resType = 'link';
  let uploadOpen = true;
  let openPdfId = null;

  // ─── AUTH ───────────────────────────────────────────────────
  async function sha256(str) {
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
    return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
  }
  async function checkPw() {
    const val = document.getElementById('pw-input').value.trim();
    if ((await sha256(val)) === PASSWORD_HASH) {
      sessionStorage.setItem('ro_auth','1');
      showMain();
    } else {
      document.getElementById('pw-error').textContent = 'Password salah.';
      document.getElementById('pw-input').value = '';
    }
  }
  function logout() { sessionStorage.removeItem('ro_auth'); location.reload(); }
  async function showMain() {
    document.getElementById('gate').style.display = 'none';
    document.getElementById('main').style.display = 'block';
    await loadResearch();
    subscribePush();
  }
  if (sessionStorage.getItem('ro_auth') === '1') showMain();

  // ─── UPLOAD TOGGLE ──────────────────────────────────────────
  function toggleUpload() {
    uploadOpen = !uploadOpen;
    document.getElementById('upload-body').classList.toggle('hidden', !uploadOpen);
    const icon = document.getElementById('upload-toggle-icon');
    icon.textContent = uploadOpen ? '▲' : '▼';
    icon.classList.toggle('open', uploadOpen);
  }

  // ─── TYPE TOGGLE ────────────────────────────────────────────
  function setResType(type) {
    resType = type;
    document.getElementById('res-btn-link').classList.toggle('active', type==='link');
    document.getElementById('res-btn-pdf').classList.toggle('active', type==='pdf');
    document.getElementById('res-link-row').style.display = type==='link' ? 'flex' : 'none';
    document.getElementById('res-pdf-row').style.display  = type==='pdf'  ? 'flex' : 'none';
  }

  // ─── SUBMIT LINK ────────────────────────────────────────────
  async function submitResearch() {
    const who   = document.getElementById('res-who').value;
    const topic = document.getElementById('res-topic').value.trim();
    const title = document.getElementById('res-title').value.trim();
    const url   = document.getElementById('res-url').value.trim();
    const btn   = document.getElementById('res-submit-link');
    if (!topic || !title || !url) { showToast('⚠️ Topik, judul, dan URL wajib diisi.'); return; }
    btn.disabled = true;
    const { error } = await sb.from('research').insert({ author: who, topic, title, type: 'link', url });
    if (error) { showToast('❌ Gagal menyimpan.'); btn.disabled = false; return; }
    notifyAll(who, title);
    document.getElementById('res-title').value = '';
    document.getElementById('res-url').value = '';
    btn.disabled = false;
    showToast('✅ Link tersimpan!');
    toggleUpload();
    await loadResearch();
  }

  // ─── SUBMIT PDF ─────────────────────────────────────────────
  async function submitResearchPdf() {
    const who   = document.getElementById('res-who').value;
    const topic = document.getElementById('res-topic').value.trim();
    const title = document.getElementById('res-title-pdf').value.trim();
    const file  = document.getElementById('res-file').files[0];
    const btn   = document.getElementById('res-submit-pdf');
    if (!topic || !title || !file) { showToast('⚠️ Topik, judul, dan PDF wajib diisi.'); return; }
    btn.disabled = true;
    btn.textContent = 'Uploading...';
    const safeName = file.name.replace(/[^a-zA-Z0-9.\-_]/g, '_');
    const path = `${Date.now()}_${safeName}`;
    const { error: upErr } = await sb.storage.from(RESEARCH_BUCKET).upload(path, file);
    if (upErr) { showToast('❌ Gagal upload PDF.'); btn.disabled = false; btn.textContent = 'Upload'; return; }
    const { error } = await sb.from('research').insert({ author: who, topic, title, type: 'pdf', storage_path: path });
    if (error) { showToast('❌ Gagal menyimpan.'); btn.disabled = false; btn.textContent = 'Upload'; return; }
    notifyAll(who, title);
    document.getElementById('res-title-pdf').value = '';
    document.getElementById('res-file-name').textContent = 'Pilih PDF...';
    document.getElementById('res-file').value = '';
    btn.disabled = false;
    btn.textContent = 'Upload';
    showToast('✅ PDF tersimpan!');
    toggleUpload();
    await loadResearch();
  }

  // ─── LOAD DATA ──────────────────────────────────────────────
  async function loadResearch() {
    const { data } = await sb.from('research').select('*').order('created_at', { ascending: false });
    allResearch = data || [];
    buildTopicChips();
    renderList();
  }

  function buildTopicChips() {
    const topics = [...new Set(allResearch.map(r => r.topic))].sort();
    const el = document.getElementById('topic-chips');
    el.innerHTML = `<button class="filter-chip ${!activeTopicFilter?'active':''}" onclick="setTopicFilter(null)">Semua</button>`
      + topics.map(t => `<button class="filter-chip ${activeTopicFilter===t?'active':''}" onclick="setTopicFilter('${t}')">${t}</button>`).join('');
  }

  function setTopicFilter(topic) {
    activeTopicFilter = topic;
    buildTopicChips();
    renderList();
  }

  function renderList() {
    const q = document.getElementById('search-input').value.toLowerCase();
    let data = allResearch;
    if (activeTopicFilter) data = data.filter(r => r.topic === activeTopicFilter);
    if (q) data = data.filter(r => r.title.toLowerCase().includes(q) || r.topic.toLowerCase().includes(q) || r.author.toLowerCase().includes(q));

    const el = document.getElementById('research-list');
    if (!data.length) {
      el.innerHTML = '<div class="empty-state">Belum ada referensi.</div>';
      return;
    }

    el.innerHTML = data.map(r => {
      const isPdf = r.type === 'pdf';
      const isOpen = openPdfId === r.id;
      const date = new Date(r.created_at).toLocaleDateString('id-ID',{day:'numeric',month:'short',year:'numeric'});
      return `
        <div class="research-card" id="card-${r.id}">
          <div class="research-card-main">
            <div class="research-card-icon" style="background:${isPdf?'rgba(248,113,113,0.12)':'rgba(56,189,248,0.12)'};">
              ${isPdf ? '📄' : '🔗'}
            </div>
            <div class="research-card-body">
              <div class="research-card-topic">${r.topic}</div>
              <div class="research-card-title">${r.title}</div>
              <div class="research-card-meta">${r.author} · ${date}</div>
            </div>
            <div class="research-card-actions">
              ${isPdf ? `
                <button class="action-btn ${isOpen?'primary':''}" onclick="togglePdfViewer('${r.id}','${r.storage_path}')">
                  ${isOpen ? '▲ Tutup' : '▼ Buka'}
                </button>
                <button class="action-btn" onclick="downloadPdf('${r.storage_path}','${r.title}')">⬇ Download</button>
              ` : `
                <a href="${r.url}" target="_blank" rel="noopener" class="action-btn primary">Buka →</a>
              `}
              <button class="action-btn del" onclick="deleteResearch('${r.id}','${r.type}','${r.storage_path||''}')">Hapus</button>
            </div>
          </div>
          ${isPdf && isOpen ? `
            <div class="pdf-viewer">
              <div class="pdf-viewer-bar">
                <span class="pdf-viewer-label">${r.title}</span>
                <button class="action-btn" onclick="downloadPdf('${r.storage_path}','${r.title}')">⬇ Download</button>
              </div>
              <iframe id="pdf-frame-${r.id}" src="" loading="lazy"></iframe>
            </div>
          ` : ''}
        </div>`;
    }).join('');

    // Load PDF src untuk yang sedang open
    if (openPdfId) {
      const r = allResearch.find(x => x.id === openPdfId);
      if (r) loadPdfFrame(r.id, r.storage_path);
    }
  }

  async function togglePdfViewer(id, path) {
    if (openPdfId === id) {
      openPdfId = null;
    } else {
      openPdfId = id;
    }
    renderList();
  }

  async function loadPdfFrame(id, path) {
    const { data } = await sb.storage.from(RESEARCH_BUCKET).createSignedUrl(path, 300);
    if (data?.signedUrl) {
      const frame = document.getElementById(`pdf-frame-${id}`);
      if (frame) frame.src = data.signedUrl;
    }
  }

  async function downloadPdf(path, title) {
    const { data } = await sb.storage.from(RESEARCH_BUCKET).createSignedUrl(path, 60);
    if (!data?.signedUrl) { showToast('❌ Gagal generate link download.'); return; }
    const a = document.createElement('a');
    a.href = data.signedUrl;
    a.download = title.replace(/[^a-zA-Z0-9 \-_]/g, '') + '.pdf';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
  }

  async function deleteResearch(id, type, path) {
    if (!confirm('Hapus referensi ini?')) return;
    if (type === 'pdf' && path) await sb.storage.from(RESEARCH_BUCKET).remove([path]);
    await sb.from('research').delete().eq('id', id);
    if (openPdfId === id) openPdfId = null;
    showToast('🗑 Referensi dihapus.');
    await loadResearch();
  }

  // ─── NOTIF ──────────────────────────────────────────────────
  async function notifyAll(who, title) {
    for (const member of MEMBERS) {
      if (member === who) continue;
      fetch(`${SUPABASE_URL}/functions/v1/send-push`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'apikey': PUBLISHABLE_KEY, 'Authorization': `Bearer ${PUBLISHABLE_KEY}` },
        body: JSON.stringify({ task_name: `📚 ${who} upload research baru: "${title}"`, assigned_to: member })
      }).catch(()=>{});
    }
  }

  // ─── PUSH SUBSCRIPTION ──────────────────────────────────────
  async function subscribePush() {
    if (!('serviceWorker' in navigator) || !('PushManager' in window)) return;
    if (VAPID_PUBLIC === 'YOUR_VAPID_PUBLIC_KEY') return;
    try {
      const reg = await navigator.serviceWorker.ready;
      const permission = await Notification.requestPermission();
      if (permission !== 'granted') return;
      const existing = await reg.pushManager.getSubscription();
      if (existing) return; // sudah subscribe, skip
      const sub = await reg.pushManager.subscribe({
        userVisibleOnly: true,
        applicationServerKey: urlBase64ToUint8Array(VAPID_PUBLIC)
      });
      const who = sessionStorage.getItem('ro_user') || 'unknown';
      await sb.from('push_subscriptions').upsert({
        user_name: who,
        subscription: sub.toJSON()
      }, { onConflict: 'user_name' });
    } catch(e) { console.log('Push subscription failed:', e); }
  }

  function urlBase64ToUint8Array(base64String) {
    const padding = '='.repeat((4 - base64String.length % 4) % 4);
    const base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
    const rawData = window.atob(base64);
    return Uint8Array.from([...rawData].map(c => c.charCodeAt(0)));
  }

  // ─── TOAST ──────────────────────────────────────────────────
  function showToast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 2500);
  }
</script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => navigator.serviceWorker.register('/sw.js'));
  }
</script>
