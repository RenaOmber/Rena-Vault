<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rena Omber — Produk</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0f1e; --bg2: #111827; --bg3: #1a2235;
      --border: rgba(99,130,255,0.12); --border-hover: rgba(99,130,255,0.28);
      --text: #e8eaf6; --text2: #8892b0; --text3: #4a5568;
      --accent: #4f6ef7; --accent-dim: rgba(79,110,247,0.12);
      --danger: #f87171;
    }
    html, body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; font-size: 14px; min-height: 100vh; }

    /* GATE */
    #gate { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; }
    .gate-mark { width: 40px; height: 4px; background: var(--accent); border-radius: 2px; margin: 0 auto 16px; }
    .gate-title { font-size: 18px; font-weight: 500; text-align: center; }
    .gate-sub { font-size: 12px; color: var(--text3); letter-spacing: 0.08em; text-transform: uppercase; text-align: center; }
    .gate-form { display: flex; gap: 8px; margin-top: 8px; }
    .gate-form input { background: var(--bg2); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-family: inherit; font-size: 14px; padding: 10px 14px; width: 220px; outline: none; }
    .gate-form input:focus { border-color: var(--border-hover); }
    .gate-form button { background: var(--accent); border: none; border-radius: 6px; color: #fff; cursor: pointer; font-family: inherit; font-size: 13px; font-weight: 500; padding: 10px 18px; }
    .gate-error { font-size: 12px; color: var(--danger); min-height: 16px; text-align: center; }

    /* MAIN */
    #main { display: none; }
    .top-bar { display: flex; align-items: center; justify-content: space-between; padding: 16px 28px; border-bottom: 1px solid var(--border); }
    .top-left { display: flex; align-items: center; gap: 10px; }
    .top-mark { width: 22px; height: 3px; background: var(--accent); border-radius: 2px; }
    .top-name { font-size: 13px; font-weight: 500; }
    .top-sub { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; }
    .top-right { display: flex; gap: 8px; }
    .btn-ghost { background: none; border: 1px solid var(--border); border-radius: 6px; color: var(--text2); cursor: pointer; font-family: inherit; font-size: 12px; padding: 6px 14px; text-decoration: none; display: inline-flex; align-items: center; transition: border-color 0.15s, color 0.15s; }
    .btn-ghost:hover { border-color: var(--border-hover); color: var(--text); }

    /* LAYOUT */
    .layout { display: grid; grid-template-columns: 210px 1fr; min-height: calc(100vh - 53px); }

    /* SIDEBAR */
    .sidebar { border-right: 1px solid var(--border); padding: 18px 0; display: flex; flex-direction: column; gap: 0; }
    .sidebar-label { font-size: 10px; color: var(--text3); letter-spacing: 0.1em; text-transform: uppercase; padding: 0 16px; margin-bottom: 6px; }
    .prod-item { display: flex; align-items: center; justify-content: space-between; padding: 8px 16px; cursor: pointer; border-left: 2px solid transparent; transition: background 0.1s; font-size: 13px; color: var(--text2); }
    .prod-item:hover { background: var(--bg2); color: var(--text); }
    .prod-item.active { border-left-color: var(--accent); background: var(--bg2); color: var(--text); font-weight: 500; }
    .prod-item-del { opacity: 0; background: none; border: none; color: var(--text3); cursor: pointer; font-size: 15px; padding: 0 2px; line-height: 1; }
    .prod-item:hover .prod-item-del { opacity: 1; }
    .prod-item-del:hover { color: var(--danger); }
    .add-prod-btn { margin: 10px 14px 0; padding: 8px 10px; background: var(--accent-dim); border: 1px dashed var(--border-hover); border-radius: 6px; cursor: pointer; font-size: 12px; color: var(--text2); text-align: center; transition: background 0.15s; }
    .add-prod-btn:hover { background: rgba(79,110,247,0.2); color: var(--text); }

    /* CONTENT */
    .content { padding: 26px 34px; overflow-y: auto; }
    .content-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
    .content-title { font-size: 20px; font-weight: 600; }

    /* ARTIKEL TABS */
    .artikel-bar { display: flex; align-items: center; gap: 0; border-bottom: 1px solid var(--border); margin-bottom: 22px; }
    .artikel-tab { background: none; border: none; border-bottom: 2px solid transparent; color: var(--text3); cursor: pointer; font-family: inherit; font-size: 13px; padding: 8px 16px; margin-bottom: -1px; transition: color 0.15s, border-color 0.15s; }
    .artikel-tab:hover { color: var(--text2); }
    .artikel-tab.active { border-bottom-color: var(--accent); color: var(--text); font-weight: 500; }
    .artikel-tab-del { font-size: 11px; color: var(--text3); margin-left: 4px; cursor: pointer; opacity: 0; }
    .artikel-tab:hover .artikel-tab-del { opacity: 1; }
    .add-artikel-btn { background: none; border: none; color: var(--text3); cursor: pointer; font-size: 18px; padding: 8px 12px; transition: color 0.15s; }
    .add-artikel-btn:hover { color: var(--accent); }

    /* FORM */
    .form-section { margin-bottom: 24px; }
    .form-section-title { font-size: 10px; color: var(--text3); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 10px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
    .form-row.single { grid-template-columns: 1fr; }
    .form-group { display: flex; flex-direction: column; gap: 5px; }
    .form-label { font-size: 12px; color: var(--text2); }
    .form-input { background: var(--bg2); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-family: inherit; font-size: 13px; padding: 8px 12px; outline: none; width: 100%; transition: border-color 0.15s; }
    .form-input:focus { border-color: var(--border-hover); }
    textarea.form-input { resize: vertical; min-height: 72px; line-height: 1.6; }

    /* UPLOAD */
    .upload-zone { border: 1px dashed var(--border-hover); border-radius: 8px; padding: 16px; text-align: center; cursor: pointer; color: var(--text3); font-size: 12px; transition: background 0.15s, border-color 0.15s; position: relative; min-height: 80px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px; }
    .upload-zone:hover { background: var(--accent-dim); border-color: var(--accent); }
    .upload-zone.has-file { border-style: solid; border-color: var(--accent); background: var(--accent-dim); }
    .upload-zone input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
    .upload-preview { max-width: 100%; max-height: 140px; border-radius: 6px; object-fit: contain; margin-top: 6px; }
    .upload-spinner { font-size: 11px; color: var(--accent); }

    /* SIZE TABLE */
    .size-table { width: 100%; border-collapse: collapse; }
    .size-table th { font-size: 11px; color: var(--text3); font-weight: 500; text-align: center; padding: 6px 8px; border: 1px solid var(--border); background: var(--bg3); letter-spacing: 0.06em; text-transform: uppercase; }
    .size-table td { border: 1px solid var(--border); padding: 3px; }
    .size-table input { background: transparent; border: none; color: var(--text); font-family: inherit; font-size: 13px; text-align: center; width: 100%; padding: 5px; outline: none; }
    .size-table input:focus { background: var(--accent-dim); }
    .size-total { background: var(--bg3); }

    /* ACTIONS */
    .form-actions { display: flex; gap: 10px; margin-top: 8px; flex-wrap: wrap; }
    .btn-primary { background: var(--accent); border: none; border-radius: 6px; color: #fff; cursor: pointer; font-family: inherit; font-size: 13px; font-weight: 500; padding: 9px 18px; transition: opacity 0.15s; }
    .btn-primary:hover { opacity: 0.85; }
    .btn-primary:disabled { opacity: 0.4; cursor: default; }
    .save-status { font-size: 12px; color: var(--text3); display: flex; align-items: center; }

    /* EMPTY */
    .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: calc(100vh - 53px); color: var(--text3); gap: 10px; }
    .empty-state p { font-size: 13px; }
  </style>
</head>
<body>

<div id="gate">
  <div>
    <div class="gate-mark"></div>
    <div class="gate-title">Rena Omber</div>
    <div class="gate-sub" style="margin-top:4px;">Manajemen Produk</div>
  </div>
  <div>
    <div class="gate-form">
      <input type="password" id="pw-input" placeholder="Password" onkeydown="if(event.key==='Enter')checkPw()" />
      <button onclick="checkPw()">Masuk</button>
    </div>
    <div class="gate-error" id="pw-error"></div>
  </div>
</div>

<div id="main">
  <div class="top-bar">
    <div class="top-left">
      <div class="top-mark"></div>
      <div>
        <div class="top-name">Rena Omber</div>
        <div class="top-sub">Manajemen Produk</div>
      </div>
    </div>
    <div class="top-right">
      <a href="sales.html" class="btn-ghost">Penjualan</a>
      <a href="finance.html" class="btn-ghost">Finance</a>
      <a href="biaya.html" class="btn-ghost">Biaya Produk</a>
      <a href="vendor.html" class="btn-ghost">Vendor</a>
      <a href="index.html" class="btn-ghost">Vault</a>
      <button class="btn-ghost" onclick="logout()">Keluar</button>
    </div>
  </div>
  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-label">Produk</div>
      <div id="prod-list"></div>
      <div class="add-prod-btn" onclick="addProduct()">+ Tambah produk</div>
    </aside>
    <main class="content" id="content">
      <div class="empty-state">
        <svg width="36" height="36" fill="none" viewBox="0 0 24 24" stroke="currentColor" style="opacity:0.3"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M20.25 7.5l-.625 10.632a2.25 2.25 0 01-2.247 2.118H6.622a2.25 2.25 0 01-2.247-2.118L3.75 7.5M10 11.25h4M3.375 7.5h17.25c.621 0 1.125-.504 1.125-1.125v-1.5c0-.621-.504-1.125-1.125-1.125H3.375c-.621 0-1.125.504-1.125 1.125v1.5c0 .621.504 1.125 1.125 1.125z"/></svg>
        <p>Pilih atau tambah produk di sidebar</p>
      </div>
    </main>
  </div>
</div>

<script>
  // ─── CONFIG ────────────────────────────────────────────────
  const SUPABASE_URL  = 'https://fqvfnohhilkzvijqukfg.supabase.co';
  const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZxdmZub2hoaWxrenZpanF1a2ZnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI1NDU4NjAsImV4cCI6MjA5ODEyMTg2MH0.er10SEsmDlnx1yRLGJK2fKtLhQR40vFOXVJzH9yakCg';
  const BUCKET        = 'vault-docs';
  const PASSWORD_HASH = '3f0e57f3e719957119f0ba621629a3ae0ed1ec95d1ad8a91bd980b2896b679e4';
  // ───────────────────────────────────────────────────────────

  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);
  const SIZES = ['S','M','L','XL','XXL'];

  let products = [];
  let vendors = [];
  let activeProductId = null;
  let activeBatchIdx = 0;
  let activeArtikelIdx = 0;
  let saveTimer = null;

  // ─── AUTH ───────────────────────────────────────────────────
  async function sha256(str) {
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
    return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
  }
  async function checkPw() {
    const val = document.getElementById('pw-input').value.trim();
    if ((await sha256(val)) === PASSWORD_HASH) {
      sessionStorage.setItem('ro_auth','1');
      await showMain();
    } else {
      document.getElementById('pw-error').textContent = 'Password salah.';
      document.getElementById('pw-input').value = '';
    }
  }
  function logout() { sessionStorage.removeItem('ro_auth'); location.reload(); }
  async function showMain() {
    document.getElementById('gate').style.display = 'none';
    document.getElementById('main').style.display = 'block';
    await Promise.all([loadProducts(), loadVendors()]);
    renderSidebar();
    if (products.length) selectProduct(products[0].id);
  }

  async function loadVendors() {
    const { data } = await sb.from('vendors').select('*').order('name');
    vendors = data || [];
  }

  function vendorOptions(type, selectedId) {
    const filtered = vendors.filter(v => v.type === type);
    const opts = filtered.map(v =>
      `<option value="${v.id}" ${v.id===selectedId?'selected':''}>${v.name}</option>`
    ).join('');
    return `<option value="">Pilih vendor ${type}...</option>${opts}`;
  }

  function getVendorKaosPrice(vendorId, tebalKain, potongan) {
    const v = vendors.find(v => v.id === vendorId);
    if (!v || v.type !== 'kaos') return 0;
    const matrix = v.data?.matrix || {};
    const tebalKey = tebalKain || '';
    const entry = matrix[tebalKey];
    if (!entry) return 0;
    if (potongan === 'oversized') return entry.oversized || entry.regular || 0;
    if (potongan === 'longsleeve') return entry.longsleeve || entry.regular || 0;
    return entry.regular || 0;
  }

  function getVendorPrice(id) {
    const v = vendors.find(v => v.id === id);
    return v ? (v.price_per_unit||0) : 0;
  }

  function getColorCharge(vendorId) {
    const v = vendors.find(v => v.id === vendorId);
    return v?.data?.colorCharge || 0;
  }

  function recalcCOGS(a) {
    const kaosPrice = getVendorKaosPrice(a.vendorKaos, a.tebalKain, a.potongan);
    const jumlahWarna = parseInt(a.jumlahWarna)||1;
    const baseColors = (() => { const v = vendors.find(v=>v.id===a.vendorKaos); return v?.data?.baseColors||4; })();
    const extraWarna = jumlahWarna > baseColors ? (jumlahWarna - baseColors) * getColorCharge(a.vendorKaos) : 0;
    return kaosPrice + extraWarna + getVendorPrice(a.vendorHangtag) + getVendorPrice(a.vendorPackaging);
  }
  if (sessionStorage.getItem('ro_auth') === '1') showMain();

  // ─── LOAD / SAVE ────────────────────────────────────────────
  async function loadProducts() {
    const { data } = await sb.from('products').select('*').order('created_at');
    products = (data || []).map(row => ({
      id: String(row.id),
      name: row.name,
      batches: row.data?.batches || [defaultBatch('Batch 1')]
    }));
  }

  function defaultBatch(name) {
    return { name, artikels: [defaultArtikel('Artikel 1')] };
  }

  function defaultArtikel(name) {
    return {
      name,
      mockupUrl: '', mockupName: '', mockupPath: '',
      designUrl: '', designName: '', designPath: '',
      sizechartUrl: '', sizechartName: '', sizechartPath: '',
      sablon: '', sablonLink: '', warnaKaos: '', tebalKain: '', potongan: 'regular', jumlahWarna: 1,
      vendorKaos: '', vendorHangtag: '', vendorPackaging: '',
      sizes: { S:0, M:0, L:0, XL:0, XXL:0 },
      masukVendor: '', keluarVendor: '', keterangan: ''
    };
  }

  async function saveProduct(p) {
    await sb.from('products').upsert({
      id: p.id,
      name: p.name,
      data: { batches: p.batches },
      updated_at: new Date().toISOString()
    });
    setSaveStatus('Tersimpan');
  }

  function scheduleSave(p) {
    setSaveStatus('Menyimpan...');
    clearTimeout(saveTimer);
    saveTimer = setTimeout(() => saveProduct(p), 900);
  }

  function setSaveStatus(msg) {
    const el = document.getElementById('save-status');
    if (el) el.textContent = msg;
  }

  // ─── PRODUCTS ───────────────────────────────────────────────
  async function addProduct() {
    const name = prompt('Nama produk (contoh: T-Shirt, Hoodie):');
    if (!name?.trim()) return;
    const p = {
      id: Date.now().toString(),
      name: name.trim(),
      batches: [defaultBatch('Batch 1')]
    };
    products.push(p);
    await saveProduct(p);
    renderSidebar();
    selectProduct(p.id);
  }

  async function deleteProduct(id, e) {
    e.stopPropagation();
    const p = products.find(p=>p.id===id);
    if (!confirm(`Hapus "${p.name}"?`)) return;
    await sb.from('products').delete().eq('id', id);
    products = products.filter(p=>p.id!==id);
    renderSidebar();
    if (activeProductId === id) {
      activeProductId = null;
      document.getElementById('content').innerHTML = `<div class="empty-state"><p>Pilih atau tambah produk di sidebar</p></div>`;
    }
  }

  function renderSidebar() {
    const el = document.getElementById('prod-list');
    el.innerHTML = products.map(p=>`
      <div class="prod-item ${p.id===activeProductId?'active':''}" onclick="selectProduct('${p.id}')">
        <span>${p.name}</span>
        <button class="prod-item-del" onclick="deleteProduct('${p.id}',event)">×</button>
      </div>`).join('');
  }

  function selectProduct(id) {
    activeProductId = String(id);
    activeBatchIdx = 0;
    activeArtikelIdx = 0;
    renderSidebar();
    renderProductPage();
  }

  // ─── ARTIKEL ────────────────────────────────────────────────
  // ─── BATCH ──────────────────────────────────────────────────
  function addBatch() {
    const p = products.find(p=>String(p.id)===String(activeProductId));
    const n = p.batches.length + 1;
    p.batches.push(defaultBatch(`Batch ${n}`));
    activeBatchIdx = p.batches.length - 1;
    activeArtikelIdx = 0;
    scheduleSave(p);
    renderProductPage();
  }

  function deleteBatch(idx, e) {
    e.stopPropagation();
    const p = products.find(p=>String(p.id)===String(activeProductId));
    if (p.batches.length <= 1) { alert('Minimal satu batch.'); return; }
    if (!confirm(`Hapus "${p.batches[idx].name}"?`)) return;
    p.batches.splice(idx, 1);
    activeBatchIdx = Math.min(activeBatchIdx, p.batches.length - 1);
    activeArtikelIdx = 0;
    scheduleSave(p);
    renderProductPage();
  }

  function selectBatch(idx) {
    activeBatchIdx = idx;
    activeArtikelIdx = 0;
    renderProductPage();
  }

  function addArtikel() {
    const p = products.find(p=>String(p.id)===String(activeProductId));
    const batch = p.batches[activeBatchIdx];
    const n = batch.artikels.length + 1;
    batch.artikels.push(defaultArtikel(`Artikel ${n}`));
    activeArtikelIdx = batch.artikels.length - 1;
    scheduleSave(p);
    renderProductPage();
  }

  function deleteArtikel(idx, e) {
    e.stopPropagation();
    const p = products.find(p=>String(p.id)===String(activeProductId));
    const batch = p.batches[activeBatchIdx];
    if (batch.artikels.length <= 1) { alert('Minimal satu artikel.'); return; }
    if (!confirm(`Hapus "${batch.artikels[idx].name}"?`)) return;
    batch.artikels.splice(idx, 1);
    activeArtikelIdx = Math.min(activeArtikelIdx, batch.artikels.length - 1);
    scheduleSave(p);
    renderProductPage();
  }

  function selectArtikel(idx) {
    activeArtikelIdx = idx;
    renderProductPage();
  }

  // ─── RENDER ─────────────────────────────────────────────────
  function renderProductPage() {
    const p = products.find(p=>String(p.id)===String(activeProductId));
    const batch = p.batches[activeBatchIdx];
    const a = batch.artikels[activeArtikelIdx];
    const total = SIZES.reduce((s,sz)=>s+(parseInt(a.sizes[sz])||0),0);


    document.getElementById('content').innerHTML = `
      <div class="content-header">
        <div class="content-title">${p.name}</div>
        <span class="save-status" id="save-status"></span>
      </div>

      <div class="artikel-bar" style="margin-bottom:0;border-bottom:none;padding-bottom:0;">
        ${p.batches.map((b,i)=>`
          <button class="artikel-tab ${i===activeBatchIdx?'active':''}" onclick="selectBatch(${i})">
            ${b.name}
            <span class="artikel-tab-del" onclick="deleteBatch(${i},event)">×</span>
          </button>`).join('')}
        <button class="add-artikel-btn" onclick="addBatch()" title="Tambah batch" style="font-size:16px;padding:8px 10px;">+</button>
      </div>


      <div class="artikel-bar" style="margin-bottom:22px;padding-left:8px;background:var(--bg2);border-radius:0 0 6px 6px;">
        ${batch.artikels.map((ar,i)=>`
          <button class="artikel-tab ${i===activeArtikelIdx?'active':''}" onclick="selectArtikel(${i})" style="font-size:12px;padding:6px 12px;">
            ${ar.name}
            <span class="artikel-tab-del" onclick="deleteArtikel(${i},event)">×</span>
          </button>`).join('')}
        <button class="add-artikel-btn" onclick="addArtikel()" title="Tambah artikel" style="font-size:14px;padding:6px 8px;">+</button>
      </div>

      <div class="form-section">
        <div class="form-section-title">Info Artikel</div>
        <div class="form-row">
          <div class="form-group">
            <div class="form-label">Nama Artikel</div>
            <input class="form-input" value="${a.name}" placeholder="Nama artikel..." onchange="updateArtikelField('name',this.value)" />
          </div>
          <div class="form-group">
            <div class="form-label">Jenis Sablon</div>
            <select class="form-input" onchange="updateArtikelField('sablon',this.value)">
              <option value="" ${!a.sablon?'selected':''}>Pilih jenis sablon...</option>
              <option value="DTF" ${a.sablon==='DTF'?'selected':''}>DTF (Direct to Film)</option>
              <option value="Plastisol" ${a.sablon==='Plastisol'?'selected':''}>Plastisol</option>
              <option value="Rubber" ${a.sablon==='Rubber'?'selected':''}>Rubber</option>
              <option value="Discharge" ${a.sablon==='Discharge'?'selected':''}>Discharge</option>
              <option value="Sublimasi" ${a.sablon==='Sublimasi'?'selected':''}>Sublimasi</option>
              <option value="Bordir" ${a.sablon==='Bordir'?'selected':''}>Bordir</option>
              <option value="Lainnya" ${a.sablon==='Lainnya'?'selected':''}>Lainnya</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <div class="form-label">Warna Kaos</div>
            <input class="form-input" value="${a.warnaKaos||''}" placeholder="Contoh: Putih, Hitam, Navy..." onchange="updateArtikelField('warnaKaos',this.value)" />
          </div>
          <div class="form-group">
            <div class="form-label">Tebal Kain</div>
            <select class="form-input" onchange="updateArtikelField('tebalKain',this.value)">
              <option value="" ${!a.tebalKain?'selected':''}>Pilih tebal kain...</option>
              <option value="16s" ${a.tebalKain==='16s'?'selected':''}>16s (tebal)</option>
              <option value="20s" ${a.tebalKain==='20s'?'selected':''}>20s (medium)</option>
              <option value="24s" ${a.tebalKain==='24s'?'selected':''}>24s (tipis)</option>
            </select>
          </div>
        </div>
        <div class="form-section-title" style="margin-top:14px;">Vendor Kaos</div>
        <div class="form-row">
          <div class="form-group">
            <div class="form-label">Vendor Kaos</div>
            <select class="form-input" onchange="updateVendor('vendorKaos',this.value)">
              ${vendorOptions('kaos', a.vendorKaos)}
            </select>
          </div>
          <div class="form-group">
            <div class="form-label">Potongan</div>
            <select class="form-input" onchange="updateVendor('potongan',this.value)">
              <option value="regular" ${a.potongan==='regular'||!a.potongan?'selected':''}>Regular</option>
              <option value="oversized" ${a.potongan==='oversized'?'selected':''}>Oversized (+Rp 5.000)</option>
              <option value="longsleeve" ${a.potongan==='longsleeve'?'selected':''}>Longsleeve (+Rp 10.000)</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <div class="form-label">Jumlah Warna Sablon</div>
            <input type="number" min="1" class="form-input" value="${a.jumlahWarna||1}" 
              onchange="updateVendor('jumlahWarna',parseInt(this.value)||1)" />
          </div>
          <div class="form-group">
            <div class="form-label">Biaya tambahan warna (auto)</div>
            <div style="background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:9px 12px;font-size:12px;color:var(--text2);">
              ${(() => {
                const jw = parseInt(a.jumlahWarna)||1;
                const cc = getColorCharge(a.vendorKaos);
                const vk = vendors.find(v=>v.id===a.vendorKaos);
                const bc = vk?.data?.baseColors||4;
                const extra = jw > bc ? (jw-bc)*cc : 0;
                return extra ? 'Rp ' + extra.toLocaleString('id-ID') : jw <= bc ? `Tidak ada (inkl. s.d ${bc} warna)` : 'Vendor belum set charge';
              })()}
            </div>
          </div>
        </div>
        <div class="form-section-title" style="margin-top:4px;">Vendor Lainnya</div>
        <div class="form-row">
          <div class="form-group">
            <div class="form-label">Vendor Hangtag</div>
            <select class="form-input" onchange="updateVendor('vendorHangtag',this.value)">
              ${vendorOptions('hangtag', a.vendorHangtag)}
            </select>
          </div>
          <div class="form-group">
            <div class="form-label">Vendor Packaging</div>
            <select class="form-input" onchange="updateVendor('vendorPackaging',this.value)">
              ${vendorOptions('packaging', a.vendorPackaging)}
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <div class="form-label">COGS Total per unit (auto)</div>
            <div style="background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:9px 12px;font-size:13px;font-weight:600;color:var(--accent);" id="cogs-display">
              Rp ${recalcCOGS(a).toLocaleString('id-ID')}
            </div>
          </div>
        </div>
        <div class="form-row single">
          <div class="form-group">
            <div class="form-label">Link File Sablon (Google Drive)</div>
            <input class="form-input" value="${a.sablonLink||''}" placeholder="https://drive.google.com/..." onchange="updateArtikelField('sablonLink',this.value)" />
          </div>
        </div>
      </div>

      <div class="form-section">
        <div class="form-section-title">Visual</div>
        <div class="form-row">
          <div class="form-group">
            <div class="form-label">Mockup Design</div>
            <div class="upload-zone ${a.mockupUrl?'has-file':''}" id="zone-mockup">
              <input type="file" accept="image/*" onchange="handleImg('mockup',this)" />
              ${a.mockupUrl
                ? `<img src="${a.mockupUrl}" class="upload-preview" /><div style="font-size:11px;margin-top:4px;">${a.mockupName}</div><label style="margin-top:6px;font-size:11px;color:var(--accent);cursor:pointer;position:relative;z-index:2;">Ganti file<input type="file" accept="image/*" onchange="handleImg('mockup',this)" style="display:none;" /></label>`
                : `<div style="font-size:20px;">+</div><div>${a.mockupName||'Upload mockup'}</div>`}
            </div>
          </div>
          <div class="form-group">
            <div class="form-label">Design (artwork)</div>
            <div class="upload-zone ${a.designUrl?'has-file':''}" id="zone-design">
              <input type="file" accept="image/*" onchange="handleImg('design',this)" style="${a.designUrl?'display:none;':''}" />
              ${a.designUrl
                ? `<img src="${a.designUrl}" class="upload-preview" /><div style="font-size:11px;margin-top:4px;">${a.designName}</div><label style="margin-top:6px;font-size:11px;color:var(--accent);cursor:pointer;position:relative;z-index:2;">Ganti file<input type="file" accept="image/*" onchange="handleImg('design',this)" style="display:none;" /></label>`
                : `<div style="font-size:20px;">+</div><div>${a.designName||'Upload design'}</div>`}
            </div>
          </div>
        </div>
        <div class="form-group">
          <div class="form-label">Size Chart</div>
          <div class="upload-zone ${a.sizechartUrl?'has-file':''}" id="zone-sizechart">
            <input type="file" accept="image/*" onchange="handleImg('sizechart',this)" style="${a.sizechartUrl?'display:none;':''}" />
            ${a.sizechartUrl
              ? `<img src="${a.sizechartUrl}" class="upload-preview" /><div style="font-size:11px;margin-top:4px;">${a.sizechartName}</div><label style="margin-top:6px;font-size:11px;color:var(--accent);cursor:pointer;position:relative;z-index:2;">Ganti file<input type="file" accept="image/*" onchange="handleImg('sizechart',this)" style="display:none;" /></label>`
              : `<div style="font-size:20px;">+</div><div>${a.sizechartName||'Upload size chart'}</div>`}
          </div>
        </div>
      </div>

      <div class="form-section">
        <div class="form-section-title">Jumlah per Ukuran</div>
        <table class="size-table">
          <tr>${SIZES.map(s=>`<th>${s}</th>`).join('')}<th>Total</th></tr>
          <tr>
            ${SIZES.map(s=>`<td><input type="number" min="0" value="${a.sizes[s]||0}" onchange="updateSize('${s}',this.value)" /></td>`).join('')}
            <td class="size-total" style="text-align:center;font-weight:600;color:var(--accent);padding:5px;" id="total-cell">${total}</td>
          </tr>
        </table>
      </div>

      <div class="form-section">
        <div class="form-section-title">Vendor & Keterangan</div>
        <div class="form-row">
          <div class="form-group">
            <div class="form-label">Masuk Vendor</div>
            <input type="date" class="form-input" value="${a.masukVendor||''}" onchange="updateArtikelField('masukVendor',this.value)" />
          </div>
          <div class="form-group">
            <div class="form-label">Keluar Vendor</div>
            <input type="date" class="form-input" value="${a.keluarVendor||''}" onchange="updateArtikelField('keluarVendor',this.value)" />
          </div>
        </div>
        <div class="form-row single">
          <div class="form-group">
            <div class="form-label">Keterangan</div>
            <textarea class="form-input" placeholder="Catatan tambahan..." onchange="updateArtikelField('keterangan',this.value)">${a.keterangan||''}</textarea>
          </div>
        </div>
      </div>

      <div class="form-actions">
        <button class="btn-primary" onclick="exportPDF()">Export PDF</button>
      </div>`;
  }

  // ─── FIELD UPDATES ──────────────────────────────────────────
  function updateBatchField(field, val) {
    const p = products.find(p=>String(p.id)===String(activeProductId));
    if (!p) return;
    p.batches[activeBatchIdx][field] = field === 'cogs' ? parseInt(val)||0 : val;
    scheduleSave(p);
    renderProductPage();
  }

  function updateVendor(field, val) {
    const p = products.find(p=>String(p.id)===String(activeProductId));
    if (!p) return;
    const a = p.batches[activeBatchIdx].artikels[activeArtikelIdx];
    a[field] = field === 'jumlahWarna' ? (parseInt(val)||1) : val;
    // Always re-render to reflect updated COGS and color charge preview
    scheduleSave(p);
    renderProductPage();
  }

  function updateArtikelField(field, val) {
    const p = products.find(p=>String(p.id)===String(activeProductId));
    if (!p) return;
    p.batches[activeBatchIdx].artikels[activeArtikelIdx][field] = val;
    if (field === 'name') renderProductPage();
    scheduleSave(p);
  }

  function updateSize(size, val) {
    const p = products.find(p=>String(p.id)===String(activeProductId));
    p.batches[activeBatchIdx].artikels[activeArtikelIdx].sizes[size] = parseInt(val)||0;
    const total = SIZES.reduce((s,sz)=>s+(parseInt(p.batches[activeBatchIdx].artikels[activeArtikelIdx].sizes[sz])||0),0);
    const el = document.getElementById('total-cell');
    if (el) el.textContent = total;
    scheduleSave(p);
  }

  // ─── IMAGE UPLOAD TO STORAGE ────────────────────────────────
  async function handleImg(type, input) {
    const file = input.files[0];
    if (!file) return;
    const p = products.find(p=>String(p.id)===String(activeProductId));
    if (!p) return;
    const a = p.batches[activeBatchIdx].artikels[activeArtikelIdx];

    const zone = document.getElementById(`zone-${type}`);
    zone.innerHTML = `<div class="upload-spinner">Mengupload...</div><input type="file" accept="image/*" onchange="handleImg('${type}',this)" style="position:absolute;inset:0;opacity:0;cursor:pointer;" />`;

    // Compress first
    const compressed = await compressImage(file, 900, 0.78);
    const ext = 'jpg';
    const path = `products/${p.id}/${activeArtikelIdx}_${type}.${ext}`;

    const { data, error } = await sb.storage.from(BUCKET).upload(path, compressed, {
      contentType: 'image/jpeg', upsert: true
    });

    if (error) { alert('Upload gagal: ' + error.message); return; }

    const { data: urlData } = sb.storage.from(BUCKET).getPublicUrl(path);
    // Use signed URL since bucket is private
    const { data: signed } = await sb.storage.from(BUCKET).createSignedUrl(path, 60*60*24*365);
    const url = signed?.signedUrl || urlData?.publicUrl || '';

    a[`${type}Url`] = url;
    a[`${type}Name`] = file.name;
    a[`${type}Path`] = path; // store path for re-signing
    scheduleSave(p);
    renderProductPage();
  }

  async function compressImage(file, maxPx, quality) {
    return new Promise(res => {
      const reader = new FileReader();
      reader.onload = e => {
        const img = new Image();
        img.onload = () => {
          let w = img.width, h = img.height;
          if (w > maxPx || h > maxPx) {
            if (w > h) { h = Math.round(h*maxPx/w); w = maxPx; }
            else { w = Math.round(w*maxPx/h); h = maxPx; }
          }
          const canvas = document.createElement('canvas');
          canvas.width = w; canvas.height = h;
          canvas.getContext('2d').drawImage(img, 0, 0, w, h);
          canvas.toBlob(blob => res(blob), 'image/jpeg', quality);
        };
        img.src = e.target.result;
      };
      reader.readAsDataURL(file);
    });
  }

  // ─── PDF EXPORT ─────────────────────────────────────────────
  async function exportPDF() {
    const p = products.find(p=>String(p.id)===String(activeProductId));
    if (!p) { alert('Pilih produk dulu.'); return; }
    const batch = p.batches[activeBatchIdx];
    const a = batch.artikels[activeArtikelIdx];
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ orientation:'portrait', unit:'mm', format:'a4' });
    const W = 210, M = 16;
    let y = M;

    // Header
    doc.setFontSize(16); doc.setFont('helvetica','bold'); doc.text('Rena Omber', M, y); y += 7;
    doc.setFontSize(10); doc.setFont('helvetica','normal'); doc.setTextColor(130,130,130);
    doc.text('Product Sheet', M, y); y += 5;
    doc.setDrawColor(79,110,247); doc.setLineWidth(0.5);
    doc.line(M, y, W-M, y); y += 8;
    doc.setTextColor(0,0,0);
    doc.setFontSize(14); doc.setFont('helvetica','bold');
    doc.text(`${p.name} — ${batch.name} — ${a.name}`, M, y); y += 7;
    if (a.sablon || a.sablonLink || a.warnaKaos || a.tebalKain) {
      doc.setFontSize(9); doc.setFont('helvetica','normal');
      const specs = [];
      if (a.sablon) specs.push(`Sablon: ${a.sablon}`);
      if (a.warnaKaos) specs.push(`Warna: ${a.warnaKaos}`);
      if (a.tebalKain) specs.push(`Kain: ${a.tebalKain}`);
      if (specs.length) { doc.setTextColor(60,60,60); doc.text(specs.join('  ·  '), M, y); y += 5; }
      if (a.sablonLink) {
        doc.setTextColor(79,110,247);
        doc.text(`File sablon: ${a.sablonLink}`, M, y, { maxWidth: W-M*2 });
        y += 5;
      }
      doc.setTextColor(0,0,0); y += 2;
    } else { y += 3; }

    // Load image helper
    const loadImgData = (url) => new Promise(res => {
      if (!url) return res(null);
      const img = new Image();
      img.crossOrigin = 'anonymous';
      img.onload = () => {
        // Resize to max 800px before injecting into PDF
        const MAX = 800;
        let w = img.width, h = img.height;
        if (w > MAX || h > MAX) { if(w>h){h=Math.round(h*MAX/w);w=MAX;}else{w=Math.round(w*MAX/h);h=MAX;} }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        res({ dataUrl: canvas.toDataURL('image/jpeg', 0.72), w, h });
      };
      img.onerror = () => res(null);
      img.src = url;
    });

    const fitImg = (imgData, maxW, maxH) => {
      if (!imgData) return null;
      let { w, h } = imgData;
      const ratio = w/h;
      if (w > maxW) { w = maxW; h = w/ratio; }
      if (h > maxH) { h = maxH; w = h*ratio; }
      return { dataUrl: imgData.dataUrl, w: Math.round(w*10)/10, h: Math.round(h*10)/10 };
    };

    const colW = (W - M*2 - 8)/2;

    // Mockup + Design side by side
    const [mockup, design] = await Promise.all([loadImgData(a.mockupUrl), loadImgData(a.designUrl)]);
    if (mockup || design) {
      const startY = y;
      let maxH = startY;
      if (mockup) {
        const fm = fitImg(mockup, colW, 65);
        doc.setFontSize(8); doc.setFont('helvetica','bold'); doc.setTextColor(130,130,130);
        doc.text('MOCKUP DESIGN', M, y);
        doc.addImage(fm.dataUrl, 'JPEG', M, y+3, fm.w, fm.h);
        maxH = Math.max(maxH, y+3+fm.h);
      }
      if (design) {
        const fd = fitImg(design, colW, 65);
        doc.setFontSize(8); doc.setFont('helvetica','bold'); doc.setTextColor(130,130,130);
        doc.text('DESIGN', M+colW+8, startY);
        doc.addImage(fd.dataUrl, 'JPEG', M+colW+8, startY+3, fd.w, fd.h);
        maxH = Math.max(maxH, startY+3+fd.h);
      }
      y = maxH + 8;
    }

    // Size chart
    const sizechart = await loadImgData(a.sizechartUrl);
    if (sizechart) {
      const fs = fitImg(sizechart, W-M*2, 55);
      doc.setFontSize(8); doc.setFont('helvetica','bold'); doc.setTextColor(130,130,130);
      doc.text('SIZE CHART', M, y); y += 4;
      doc.addImage(fs.dataUrl, 'JPEG', M, y, fs.w, fs.h);
      y += fs.h + 8;
    }

    // Size table
    doc.setFontSize(8); doc.setFont('helvetica','bold'); doc.setTextColor(130,130,130);
    doc.text('JUMLAH PER UKURAN', M, y); y += 4;
    const tableW = W - M*2;
    const allSizes = [...SIZES, 'Total'];
    const total = SIZES.reduce((s,sz)=>s+(parseInt(a.sizes[sz])||0),0);

    const vals = [...SIZES.map(s=>String(a.sizes[s]||0)), String(total)];
    const colWidths = [tableW/6, tableW/6, tableW/6, tableW/6, tableW/6, tableW/6];
    let cx = M;
    // Header row — set fill inside loop to force jsPDF reset per cell
    doc.setFont('helvetica','bold'); doc.setFontSize(7);
    allSizes.forEach((s,i) => {
      doc.setFillColor(40, 50, 80);
      doc.setTextColor(255, 255, 255);
      doc.rect(cx, y, colWidths[i], 7, 'FD');
      doc.text(s, cx + colWidths[i]/2, y + 4.8, {align:'center'});
      cx += colWidths[i];
    });
    y += 7; cx = M;
    // Value row
    doc.setFont('helvetica','normal'); doc.setFontSize(9);
    vals.forEach((v,i) => {
      const isTot = i === 5;
      doc.setFillColor(isTot?220:240, isTot?228:243, isTot?255:250);
      doc.setDrawColor(190, 200, 220);
      doc.rect(cx, y, colWidths[i], 7, 'FD');
      doc.setTextColor(isTot?60:40, isTot?90:40, isTot?220:40);
      doc.text(v, cx + colWidths[i]/2, y + 4.8, {align:'center'});
      cx += colWidths[i];
    });
    y += 11;

    // Vendor
    doc.setFont('helvetica','bold'); doc.setFontSize(8); doc.setTextColor(130,130,130);
    doc.text('VENDOR', M, y); y += 5;
    doc.setFont('helvetica','normal'); doc.setFontSize(10); doc.setTextColor(30,30,30);
    if (a.masukVendor) { doc.text(`Masuk: ${fmtDate(a.masukVendor)}`, M, y); y += 5.5; }
    if (a.keluarVendor) { doc.text(`Keluar: ${fmtDate(a.keluarVendor)}`, M, y); y += 5.5; }
    y += 3;

    // Keterangan
    if (a.keterangan) {
      doc.setFont('helvetica','bold'); doc.setFontSize(8); doc.setTextColor(130,130,130);
      doc.text('KETERANGAN', M, y); y += 5;
      doc.setFont('helvetica','normal'); doc.setFontSize(10); doc.setTextColor(30,30,30);
      const lines = doc.splitTextToSize(a.keterangan, W-M*2);
      doc.text(lines, M, y); y += lines.length*5+3;
    }

    // Footer
    doc.setDrawColor(79,110,247); doc.line(M, 286, W-M, 286);
    doc.setFontSize(7); doc.setTextColor(150,150,150);
    doc.text(`Rena Omber · ${p.name} · ${batch.name} · ${a.name} · ${new Date().toLocaleDateString('id-ID')}`, M, 291);

    const filename = `${p.name}_${batch.name}_${a.name}_product_sheet.pdf`.replace(/\s+/g,'_');
    doc.save(filename);

    // Upload PDF to vault
    const pdfBlob = doc.output('blob');
    await sb.storage.from(BUCKET).upload(`ops/${filename}`, pdfBlob, { contentType:'application/pdf', upsert:true });
  }

  function fmtDate(d) {
    if (!d) return '';
    return new Date(d).toLocaleDateString('id-ID',{day:'numeric',month:'long',year:'numeric'});
  }
</script>
</body>
</html>
