<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#4f6ef7" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="RO Vault" />
  <link rel="apple-touch-icon" href="/icon-512.png" />
  <link rel="apple-touch-icon" sizes="152x152" href="/icon-512.png" />
  <link rel="apple-touch-icon" sizes="167x167" href="/icon-512.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/icon-512.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rena Omber — Internal Vault</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="theme.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.47.0/tabler-icons.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0e0e0e; --bg2: #161616; --bg3: #1e1e1e;
      --border: rgba(255,255,255,0.08); --border-hover: rgba(255,255,255,0.16);
      --text: #f0ede8; --text2: #888; --text3: #555;
      --red: #e03a2f; --red-dim: rgba(224,58,47,0.12);
    }
    html, body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; font-size: 14px; min-height: 100vh; line-height: 1.6; }

    /* GATE */
    #gate { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; }
    .gate-mark { width: 40px; height: 4px; background: var(--red); border-radius: 2px; margin-bottom: 8px; }
    .gate-title { font-size: 18px; font-weight: 500; }
    .gate-sub { font-size: 12px; color: var(--text3); letter-spacing: 0.08em; text-transform: uppercase; }
    .gate-form { display: flex; gap: 8px; margin-top: 8px; }
    .gate-form input { background: var(--bg2); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-family: inherit; font-size: 14px; padding: 10px 14px; width: 220px; outline: none; transition: border-color 0.15s; }
    .gate-form input:focus { border-color: var(--border-hover); }
    .gate-form button { background: var(--red); border: none; border-radius: 6px; color: #fff; cursor: pointer; font-family: inherit; font-size: 13px; font-weight: 500; padding: 10px 18px; transition: opacity 0.15s; }
    .gate-form button:hover { opacity: 0.85; }
    .gate-error { font-size: 12px; color: var(--red); min-height: 16px; text-align: center; }

    /* MAIN */
    #main { display: none; }
    .top-bar { display: flex; align-items: center; justify-content: space-between; padding: 20px 32px; border-bottom: 1px solid var(--border); }
    .top-left { display: flex; align-items: center; gap: 12px; }
    .top-mark { width: 24px; height: 3px; background: var(--red); border-radius: 2px; }
    .top-name { font-size: 13px; font-weight: 500; }
    .top-sub { font-size: 11px; color: var(--text3); letter-spacing: 0.06em; text-transform: uppercase; }
    .logout-btn { background: none; border: 1px solid var(--border); border-radius: 6px; color: var(--text3); cursor: pointer; font-family: inherit; font-size: 12px; padding: 6px 12px; transition: border-color 0.15s, color 0.15s; }
    .logout-btn:hover { border-color: var(--border-hover); color: var(--text2); }
    .layout { display: grid; grid-template-columns: 260px 1fr; min-height: calc(100vh - 61px); }

    /* SIDEBAR */
    .sidebar { border-right: 1px solid var(--border); padding: 24px 0; }
    .sidebar-label { font-size: 10px; color: var(--text3); letter-spacing: 0.1em; text-transform: uppercase; padding: 0 20px; margin-bottom: 8px; }
    .cat-item { display: flex; align-items: center; justify-content: space-between; padding: 10px 20px; cursor: pointer; border-left: 2px solid transparent; transition: background 0.1s, border-color 0.1s; }
    .cat-item:hover { background: var(--bg2); }
    .cat-item.active { border-left-color: var(--red); background: var(--bg2); }
    .cat-item-left { display: flex; align-items: center; gap: 10px; }
    .cat-icon { width: 34px; height: 34px; border-radius: 9px; display: flex; align-items: center; justify-content: center; margin-bottom: 10px; font-size: 17px; }
    .cat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 0 12px 12px; }
    .cat-card { background: var(--bg2); border-radius: 12px; padding: 12px 10px; cursor: pointer; transition: all 0.18s; border: 1px solid var(--border); }
    .cat-card:hover { background: var(--bg3); transform: scale(1.02); border-color: var(--border-hover); }
    .cat-card.active { border-color: var(--accent); background: var(--accent-dim); }
    .cat-name { font-size: 12px; font-weight: 500; color: var(--text); margin-bottom: 2px; }
    .cat-sub { font-size: 10px; color: var(--text3); }
    .cat-count { font-size: 11px; font-weight: 600; margin-top: 6px; }
    .cat-name-text { font-size: 13px; }
    .cat-badge { font-size: 10px; color: var(--text3); background: var(--bg3); border-radius: 10px; padding: 2px 7px; min-width: 20px; text-align: center; }
    .cat-item.active .cat-badge { background: var(--red-dim); color: var(--red); }

    /* TABS */
    .tab-bar { display: flex; gap: 0; border-bottom: 1px solid var(--border); margin-bottom: 24px; }
    .tab-btn { background: none; border: none; border-bottom: 2px solid transparent; color: var(--text3); cursor: pointer; font-family: inherit; font-size: 13px; padding: 10px 20px; transition: color 0.15s, border-color 0.15s; margin-bottom: -1px; }
    .tab-btn:hover { color: var(--text2); }
    .tab-btn.active { border-bottom-color: var(--red); color: var(--text); font-weight: 500; }

    /* CONTENT */
    .content { padding: 32px 40px; }
    .content-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 8px; }
    .content-title { font-size: 20px; font-weight: 500; }
    .content-sub { font-size: 12px; color: var(--text3); margin-top: 3px; }
    .upload-btn { display: flex; align-items: center; gap: 6px; background: none; border: 1px solid var(--border); border-radius: 6px; color: var(--text2); cursor: pointer; font-family: inherit; font-size: 12px; padding: 8px 14px; transition: border-color 0.15s, color 0.15s; white-space: nowrap; }
    .upload-btn:hover { border-color: var(--border-hover); color: var(--text); }
    .upload-btn svg { width: 14px; height: 14px; flex-shrink: 0; }

    /* DOC LIST folder style */
    .doc-list { display: flex; flex-direction: column; gap: 2px; }
    .doc-row { position: relative; display: flex; align-items: center; gap: 12px; background: transparent; border: 1px solid transparent; border-radius: 8px; cursor: pointer; padding: 9px 10px; transition: background 0.12s, border-color 0.12s; }
    .doc-row:hover { background: var(--bg2); border-color: var(--border); }
    .doc-row:hover .doc-delete-btn { opacity: 1; }
    .doc-file-icon { width: 30px; height: 30px; background: var(--bg3); border-radius: 6px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .doc-file-icon svg { width: 14px; height: 14px; color: var(--text3); }
    .doc-file-icon.is-pdf { background: var(--red-dim); }
    .doc-file-icon.is-pdf svg { color: var(--red); }
    .doc-file-icon.is-img { background: rgba(80,140,255,0.1); }
    .doc-file-icon.is-img svg { color: #5b8fff; }
    .doc-info { flex: 1; min-width: 0; }
    .doc-name { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text); }
    .doc-meta { font-size: 11px; color: var(--text3); margin-top: 1px; }
    .doc-delete-btn { width: 24px; height: 24px; background: none; border: 1px solid transparent; border-radius: 5px; display: flex; align-items: center; justify-content: center; cursor: pointer; opacity: 0; transition: opacity 0.15s, background 0.15s, border-color 0.15s; flex-shrink: 0; }
    .doc-delete-btn:hover { background: var(--red-dim); border-color: var(--red); }
    .doc-delete-btn svg { width: 12px; height: 12px; color: var(--red); pointer-events: none; }

    /* LANDING CARDS */
    .landing-grid { display: flex; gap: 16px; flex-wrap: wrap; }
    .landing-card { display: flex; flex-direction: column; gap: 12px; background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; cursor: pointer; padding: 24px 20px; width: 180px; transition: border-color 0.15s, background 0.15s; }
    .landing-card:hover { border-color: var(--border-hover); background: var(--bg3); }
    .landing-card-icon { width: 40px; height: 40px; background: var(--red-dim); border-radius: 10px; display: flex; align-items: center; justify-content: center; }
    .landing-card-icon svg { width: 20px; height: 20px; color: var(--red); }
    .landing-card-name { font-size: 14px; font-weight: 500; color: var(--text); }
    .landing-card-sub { font-size: 12px; color: var(--text3); }

    /* EMPTY */
    .empty { text-align: center; padding: 60px 20px; color: var(--text3); }
    .empty svg { width: 32px; height: 32px; margin: 0 auto 12px; display: block; opacity: 0.4; }
    .empty p { font-size: 13px; }
    .placeholder-msg { text-align: center; padding: 80px 20px; color: var(--text3); font-size: 13px; }

    /* CALENDAR */
    .calendar-section { margin-bottom: 28px; }
    .calendar-label { font-size: 10px; color: var(--text3); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 10px; }
    .calendar-frame { width: 100%; height: 700px; border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
    .calendar-frame iframe { width: 100%; height: 100%; border: none; display: block; }

    /* CREATE TAB */
    .create-wrap { max-width: 760px; }
    .create-field-label { font-size: 11px; color: var(--text3); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 6px; }
    .create-input { width: 100%; background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: inherit; font-size: 14px; padding: 10px 14px; outline: none; transition: border-color 0.15s; margin-bottom: 16px; }
    .create-input:focus { border-color: var(--border-hover); }
    .create-textarea { width: 100%; background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: inherit; font-size: 14px; padding: 12px 14px; outline: none; transition: border-color 0.15s; margin-bottom: 16px; resize: vertical; min-height: 200px; line-height: 1.7; }
    .create-textarea:focus { border-color: var(--border-hover); }
    .create-actions { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    .btn-primary { background: var(--red); border: none; border-radius: 6px; color: #fff; cursor: pointer; font-family: inherit; font-size: 13px; font-weight: 500; padding: 9px 18px; transition: opacity 0.15s; }
    .btn-primary:hover { opacity: 0.85; }
    .btn-secondary { background: none; border: 1px solid var(--border); border-radius: 6px; color: var(--text2); cursor: pointer; font-family: inherit; font-size: 13px; padding: 9px 18px; transition: border-color 0.15s, color 0.15s; }
    .btn-secondary:hover { border-color: var(--border-hover); color: var(--text); }

    /* PROMPT RESULT */
    .prompt-box { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; margin-top: 20px; overflow: hidden; }
    .prompt-box-header { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; border-bottom: 1px solid var(--border); }
    .prompt-box-title { font-size: 12px; color: var(--text2); font-weight: 500; }
    .copy-btn { background: none; border: 1px solid var(--border); border-radius: 5px; color: var(--text3); cursor: pointer; font-family: inherit; font-size: 11px; padding: 4px 10px; transition: all 0.15s; }
    .copy-btn:hover { border-color: var(--border-hover); color: var(--text); }
    .copy-btn.copied { border-color: #2d7a3a; color: #4caf50; }
    .prompt-content { padding: 16px; font-size: 13px; line-height: 1.7; color: var(--text2); white-space: pre-wrap; max-height: 400px; overflow-y: auto; }
    .open-claude-btn { display: flex; align-items: center; gap: 6px; margin: 12px 16px 16px; background: none; border: 1px solid var(--border); border-radius: 6px; color: var(--text2); cursor: pointer; font-family: inherit; font-size: 12px; padding: 8px 14px; text-decoration: none; transition: border-color 0.15s, color 0.15s; width: fit-content; }
    .open-claude-btn:hover { border-color: var(--border-hover); color: var(--text); }

    /* VIEWER MODAL */
    .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.75); display: flex; align-items: center; justify-content: center; z-index: 50; padding: 20px; }
    .modal-box { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; width: 100%; max-width: 860px; max-height: 90vh; display: flex; flex-direction: column; overflow: hidden; }
    .modal-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 20px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .modal-title { font-size: 13px; font-weight: 500; }
    .modal-close { background: none; border: none; color: var(--text3); cursor: pointer; font-size: 20px; line-height: 1; padding: 0; transition: color 0.15s; }
    .modal-close:hover { color: var(--text); }
    .modal-body { flex: 1; overflow-y: auto; padding: 20px; background: var(--bg); }
    #pdf-canvas-wrap { display: flex; flex-direction: column; gap: 12px; align-items: center; }
    #pdf-canvas-wrap canvas { max-width: 100%; border-radius: 4px; }
    .pdf-loading { text-align: center; color: var(--text3); font-size: 13px; padding: 40px; }
    .pdf-nav { display: flex; align-items: center; gap: 12px; justify-content: center; padding: 12px; border-top: 1px solid var(--border); flex-shrink: 0; font-size: 12px; color: var(--text2); }
    .pdf-nav button { background: none; border: 1px solid var(--border); border-radius: 5px; color: var(--text2); cursor: pointer; font-family: inherit; font-size: 12px; padding: 5px 12px; }
    .pdf-nav button:hover:not(:disabled) { border-color: var(--border-hover); color: var(--text); }
    .pdf-nav button:disabled { opacity: 0.3; cursor: default; }

    /* UPLOAD MODAL */
    .upload-modal-box { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; width: 100%; max-width: 420px; padding: 24px; }
    .upload-modal-title { font-size: 15px; font-weight: 500; margin-bottom: 16px; }
    .drop-zone { border: 1px dashed var(--border-hover); border-radius: 8px; padding: 32px 20px; text-align: center; cursor: pointer; color: var(--text3); font-size: 13px; transition: border-color 0.15s, background 0.15s; margin-bottom: 12px; }
    .drop-zone:hover, .drop-zone.drag { border-color: var(--red); background: var(--red-dim); }
    .drop-zone svg { width: 28px; height: 28px; margin: 0 auto 10px; display: block; opacity: 0.5; }
    .selected-fname { font-size: 11px; color: var(--text2); margin-bottom: 14px; min-height: 16px; }
    .upload-progress { height: 2px; background: var(--border); border-radius: 1px; margin-bottom: 14px; overflow: hidden; display: none; }
    .upload-progress-bar { height: 100%; background: var(--red); width: 0; transition: width 0.2s; border-radius: 1px; }
    .modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
    .btn-cancel { background: none; border: 1px solid var(--border); border-radius: 6px; color: var(--text3); cursor: pointer; font-family: inherit; font-size: 13px; padding: 8px 16px; }
    .btn-confirm { background: var(--red); border: none; border-radius: 6px; color: #fff; cursor: pointer; font-family: inherit; font-size: 13px; font-weight: 500; padding: 8px 16px; opacity: 0.5; transition: opacity 0.15s; }
    .btn-confirm.ready { opacity: 1; }
    .btn-confirm:disabled { cursor: default; }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }
    .alert-btn {
      position: fixed;
      top: 16px;
      right: 120px;
      z-index: 100;
      background: var(--red);
      border: none;
      border-radius: 50%;
      width: 42px;
      height: 42px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      cursor: pointer;
      text-decoration: none;
      animation: bounce 1.2s ease-in-out infinite;
      box-shadow: 0 4px 12px rgba(224,58,47,0.4);
    }
    @media (max-width: 640px) {
      /* TOP BAR */
      .top-bar { padding: 10px 14px; }
      .top-right { gap: 6px; }
      .top-right .btn-ghost:not(.theme-toggle-btn) { display: none; }
      .logout-btn { font-size: 11px; padding: 5px 10px; }
      .theme-toggle-btn { font-size: 13px; padding: 5px 8px; }
      .alert-btn { width: 34px !important; height: 34px !important; font-size: 16px !important; top: 10px !important; right: 90px !important; }

      /* LAYOUT - sidebar on top, content below, NO weekly panel */
      .layout { grid-template-columns: 1fr !important; grid-template-rows: auto 1fr; }
      .sidebar { border-right: none; border-bottom: 1px solid var(--border); padding: 8px 0; }
      .content { padding: 14px 16px; grid-template-columns: 1fr !important; }

      /* HIDE weekly panel on mobile — show as collapsible below content instead */
      #weekly-summary-panel { display: none !important; }

      /* LANDING */
      .landing-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px !important; }
      .landing-card { padding: 14px 10px !important; width: auto !important; }
      .landing-card-icon { width: 32px !important; height: 32px !important; margin-bottom: 8px !important; }
      .landing-card-name { font-size: 12px !important; }
      .landing-card-sub { font-size: 10px !important; }

      /* DOCS */
      .content-header { flex-direction: column; gap: 8px; }
      .content-title { font-size: 17px; }
      .doc-list { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
      .doc-row { flex-direction: column; align-items: flex-start; gap: 4px; padding: 10px !important; border-radius: 8px; }
      .doc-name { font-size: 12px; }
      .doc-meta { font-size: 10px; }
      .doc-download-btn { opacity: 1 !important; }
    }
  
    [data-theme="light"] .modal-box,
    [data-theme="light"] .modal-bg { background: rgba(0,0,0,0.4); }
    [data-theme="light"] .modal-box { background: #fff; }
    [data-theme="light"] .btn-ghost { background: #fff; }
    [data-theme="light"] .top-bar { background: var(--bg2); }
    [data-theme="light"] .sidebar { background: var(--bg2); }
  </style>
</head>
<body>

<!-- GATE -->
<div id="gate">
  <div style="text-align:center;">
    <div class="gate-mark" style="margin:0 auto 16px;"></div>
    <div class="gate-title">Rena Omber</div>
    <div class="gate-sub" style="margin-top:4px;">Internal Vault</div>
  </div>
  <div>
    <div class="gate-form">
      <input type="password" id="pw-input" placeholder="Password" onkeydown="if(event.key==='Enter')checkPw()" autocomplete="current-password" />
      <button onclick="checkPw()">Masuk</button>
    </div>
    <div class="gate-error" id="pw-error"></div>
  </div>
</div>

<!-- MAIN -->
<div id="main">
  <div class="top-bar">
    <div class="top-left">
      <div class="top-mark"></div>
      <div>
        <div class="top-name">Rena Omber</div>
        <div class="top-sub">Internal Vault</div>
      </div>
    </div>
    <button class="theme-toggle-btn btn-ghost" onclick="toggleTheme()" title="Mode Terang">☀️</button>
    <button class="logout-btn" onclick="logout()">Keluar</button>
  </div>
  <a href="alert.html" class="alert-btn" title="Alert Harian">✉️</a>

  <div style="position:relative;">
    <button onclick="enterSection('create')" title="Create" style="position:absolute;top:8px;right:16px;z-index:10;background:var(--bg2);border:1px solid var(--border);border-radius:50%;width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:border-color 0.15s;" onmouseover="this.style.borderColor='var(--border-hover)'" onmouseout="this.style.borderColor='var(--border)'">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" width="14" height="14" style="color:var(--text2);"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M16.862 4.487l1.687-1.688a1.875 1.875 0 112.652 2.652L10.582 16.07a4.5 4.5 0 01-1.897 1.13L6 18l.8-2.685a4.5 4.5 0 011.13-1.897l8.932-8.931zm0 0L19.5 7.125M18 14v4.75A2.25 2.25 0 0115.75 21H5.25A2.25 2.25 0 013 18.75V8.25A2.25 2.25 0 015.25 6H10"/></svg>
    </button>
  </div>
  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-label">Kategori</div>
      <div id="sidebar-cats"></div>
      <a href="team.html" style="display:flex;align-items:center;gap:10px;padding:10px 16px;font-size:13px;color:var(--text3);text-decoration:none;border-top:1px solid var(--border);margin-top:8px;transition:color 0.15s;" onmouseover="this.style.color='var(--text)'" onmouseout="this.style.color='var(--text3)'">
        <span>👥</span> Tim
      </a>
    </aside>
    <main class="content" style="display:grid;grid-template-columns:1fr 280px;overflow:hidden;">
      <div id="content-area" style="overflow-y:auto;padding-right:8px;">
      </div>
      <div id="weekly-summary-panel" style="border-left:1px solid var(--border);overflow-y:auto;transition:width 0.2s;width:280px;min-width:280px;position:relative;">
        <button onclick="toggleWeeklyPanel()" id="weekly-toggle-btn" style="position:absolute;top:8px;right:8px;z-index:10;background:none;border:1px solid var(--border);border-radius:5px;color:var(--text3);cursor:pointer;font-size:11px;padding:3px 8px;line-height:1;" title="Minimize">−</button>
        <div id="weekly-summary-inner"><div class="placeholder-msg" style="color:var(--text3);font-size:12px;padding:20px;text-align:center;">Memuat goal mingguan...</div></div>
      </div>
    </main>
  </div>
</div>

<!-- VIEWER MODAL -->

    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');

      : isImg
      ? '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M2.25 15.75l5.159-5.159a2.25 2.25 0 013.182 0l5.159 5.159m-1.5-1.5l1.409-1.409a2.25 2.25 0 013.182 0l2.909 2.909m-18 3.75h16.5a1.5 1.5 0 001.5-1.5V6a1.5 1.5 0 00-1.5-1.5H3.75A1.5 1.5 0 002.25 6v12a1.5 1.5 0 001.5 1.5zm10.5-11.25h.008v.008h-.008V8.25zm.375 0a.375.375 0 11-.75 0 .375.375 0 01.75 0z"/>'
      : '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m6.75 12H9m1.5-12H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z"/>';
    return `<div class="doc-file-icon ${cls}"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor">${icon}</svg></div>`;

    const { data } = await sb.storage.from(BUCKET).list(catId, { sortBy: { column: 'created_at', order: 'desc' } });

  async function openDoc(catId, filename) {
    document.getElementById('viewer-title').textContent = filename;
    document.getElementById('pdf-canvas-wrap').innerHTML = '<div class="pdf-loading">Memuat dokumen...</div>';
    document.getElementById('pdf-nav').style.display = 'none';

    const { data } = await sb.storage.from(BUCKET).createSignedUrl(`${catId}/${filename}`, 3600);
    if (!data?.signedUrl) {
      document.getElementById('pdf-canvas-wrap').innerHTML = '<div class="pdf-loading">Gagal memuat.</div>';
      return;
    }
    const ext = filename.split('.').pop().toLowerCase();
    if (['png','jpg','jpeg','gif','webp'].includes(ext)) {
      document.getElementById('pdf-canvas-wrap').innerHTML = `<img src="${data.signedUrl}" style="max-width:100%;border-radius:4px;" />`;
      return;
    }
    if (ext !== 'pdf') {
      document.getElementById('pdf-canvas-wrap').innerHTML = `<div class="pdf-loading">Format ini tidak bisa di-preview.<br/><a href="${data.signedUrl}" download style="color:var(--red);text-decoration:none;margin-top:8px;display:inline-block;">Download</a></div>`;
      return;
    }
    pdfPage = 1;
    pdfDoc = await pdfjsLib.getDocument(data.signedUrl).promise;
    await renderPdfPage();
  }
  async function renderPdfPage() {
    const wrap = document.getElementById('pdf-canvas-wrap');
    wrap.innerHTML = '';
    const page = await pdfDoc.getPage(pdfPage);
    const vp = page.getViewport({ scale: window.devicePixelRatio > 1 ? 1.6 : 1.2 });
    const canvas = document.createElement('canvas');
    canvas.width = vp.width; canvas.height = vp.height;
    canvas.style.width = Math.round(vp.width / (window.devicePixelRatio > 1 ? 1.6 : 1.2)) + 'px';
    wrap.appendChild(canvas);
    await page.render({ canvasContext: canvas.getContext('2d'), viewport: vp }).promise;
    const nav = document.getElementById('pdf-nav');
    if (pdfDoc.numPages > 1) {
      nav.style.display = 'flex';
      document.getElementById('page-info').textContent = `${pdfPage} / ${pdfDoc.numPages}`;
      document.getElementById('prev-btn').disabled = pdfPage <= 1;
      document.getElementById('next-btn').disabled = pdfPage >= pdfDoc.numPages;
    }
  }
  async function changePage(dir) {
    pdfPage = Math.max(1, Math.min(pdfDoc.numPages, pdfPage + dir));
    await renderPdfPage();
  }

  async function replaceProof(proofId, taskId) {
    const input = document.createElement('input');
    input.type = 'file'; input.accept = 'image/*';
    input.onchange = async (e) => {
      const file = e.target.files[0];
      if (!file) return;
      // Compress
      const reader = new FileReader();
      reader.onload = ev => {
        const img = new Image();
        img.onload = async () => {
          const MAX = 900;
          let w = img.width, h = img.height;
          if (w > MAX || h > MAX) { if(w>h){h=Math.round(h*MAX/w);w=MAX;}else{w=Math.round(w*MAX/h);h=MAX;} }
          const canvas = document.createElement('canvas');
          canvas.width = w; canvas.height = h;
          canvas.getContext('2d').drawImage(img, 0, 0, w, h);
          canvas.toBlob(async blob => {
            const path = `proofs/${taskId}_${Date.now()}.jpg`;
            await sb.storage.from('vault-docs').upload(path, blob, { contentType:'image/jpeg', upsert:true });
            const { data: signed } = await sb.storage.from('vault-docs').createSignedUrl(path, 60*60*24*365);
            await sb.from('task_proofs').update({ image_url: signed?.signedUrl, proof_type: 'image' }).eq('id', proofId);
            await enterProofArchive();
          }, 'image/jpeg', 0.78);
        };
        img.src = ev.target.result;
      };
      reader.readAsDataURL(file);
    };
    input.click();
  }

  async function loadWeeklySummary() {
    const el = document.getElementById('weekly-summary-inner');
    if (!el) return;

    const now = new Date();
    const day = now.getDay();
    const monday = new Date(now);
    monday.setDate(now.getDate() - (day===0?6:day-1));
    monday.setHours(0,0,0,0);
    const sunday = new Date(monday);
    sunday.setDate(monday.getDate() + 6);
    sunday.setHours(23,59,59,999);

    const [projRes, taskRes] = await Promise.all([
      sb.from('timeline_projects').select('*'),
      sb.from('timeline_tasks').select('*').order('sort_order')
    ]);
    const projects = projRes.data||[];
    const tasks = taskRes.data||[];

    const parseD = str => { if(!str) return null; const [y,m,d]=str.split('-').map(Number); return new Date(y,m-1,d); };
    const weekTasks = tasks.filter(t => {
      const s = parseD(t.start_date), e = parseD(t.end_date);
      return s && e && s <= sunday && e >= monday;
    });

    const fmtDate = d => d.toLocaleDateString('id-ID',{day:'numeric',month:'short'});
    const STATUS_LABEL = { todo:'To Do', progress:'In Progress', done:'Done', blocked:'Blocked' };

    if (!weekTasks.length) {
      el.innerHTML = `<div style="padding:20px;color:var(--text3);font-size:13px;text-align:center;">Tidak ada task minggu ini.<br/><a href="bulk-task.html" style="color:var(--accent);font-size:12px;margin-top:8px;display:inline-block;">+ Tambah task</a></div>`;
      return;
    }

    let html = `<div style="padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;">
      <div style="font-size:12px;font-weight:600;color:var(--text2);">GOAL MINGGU INI</div>
      <div style="font-size:11px;color:var(--text3);">${fmtDate(monday)} — ${fmtDate(sunday)}</div>
    </div>`;

    projects.forEach(proj => {
      const pt = weekTasks.filter(t=>t.project_id===proj.id);
      if (!pt.length) return;
      const done = pt.filter(t=>(t.actual_status||t.status)==='done').length;
      const pct = Math.round((done/pt.length)*100);
      const color = pct>=70?'var(--green)':pct>=40?'var(--yellow)':'var(--accent)';

      html += `<div style="padding:12px 20px;border-bottom:1px solid var(--border);">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">
          <div style="font-size:12px;font-weight:600;">${proj.name}</div>
          <div style="font-size:11px;color:${color};font-weight:600;">${done}/${pt.length}</div>
        </div>
        <div style="height:4px;background:var(--bg3);border-radius:2px;overflow:hidden;margin-bottom:8px;">
          <div style="height:100%;width:${pct}%;background:${color};border-radius:2px;"></div>
        </div>
        ${pt.map(t=>{
          const s = t.actual_status||t.status||'todo';
          const isDone = s==='done';
          const dotColor = {todo:'var(--accent)',progress:'var(--yellow)',done:'var(--green)',blocked:'var(--red)'}[s];
          return `<div style="display:flex;align-items:center;gap:8px;padding:3px 0;">
            <div style="width:6px;height:6px;border-radius:50%;background:${dotColor};flex-shrink:0;"></div>
            <div style="font-size:12px;color:${isDone?'var(--text3)':'var(--text2)'};flex:1;${isDone?'text-decoration:line-through;':''};overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${t.name}</div>
            ${t.assigned_to?`<div style="font-size:10px;color:var(--text3);">${t.assigned_to}</div>`:''}
          </div>`;
        }).join('')}
      </div>`;
    });

    html += `<div style="padding:10px 20px;"><a href="weekly.html" style="font-size:11px;color:var(--accent);text-decoration:none;">Lihat semua →</a></div>`;
    el.innerHTML = html;
  }

          </div>
        </div>
        ${p.image_url ? `<img src="${p.image_url}" style="max-width:100%;max-height:160px;border-radius:6px;object-fit:contain;" />` : ''}
        ${p.link ? `<a href="${p.link}" target="_blank" style="font-size:12px;color:var(--accent);text-decoration:none;">🔗 ${p.link.substring(0,60)}${p.link.length>60?'...':''}</a>` : ''}
        ${p.notes ? `<div style="font-size:12px;color:var(--text2);background:var(--bg3);border-radius:6px;padding:8px 10px;width:100%;">${p.notes}</div>` : ''}
        <div style="display:flex;gap:8px;margin-top:4px;">
          <button onclick="deleteProof('${p.id}')" style="background:none;border:1px solid rgba(248,113,113,0.3);border-radius:5px;color:#f87171;cursor:pointer;font-size:11px;padding:3px 10px;">Hapus</button>
          <button onclick="replaceProof('${p.id}','${p.task_id}')" style="background:none;border:1px solid var(--border);border-radius:5px;color:var(--text3);cursor:pointer;font-size:11px;padding:3px 10px;">Upload Ulang</button>
        </div>
      </div>`;
    }).join('')}</div>`;
  }
</script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => navigator.serviceWorker.register('/sw.js'));
    }
  </script>
</body>
</html>
