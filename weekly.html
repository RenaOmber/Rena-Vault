<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rena Omber — Goal Mingguan</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="theme.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0f1e; --bg2: #111827; --bg3: #1a2235;
      --border: rgba(99,130,255,0.12); --border-hover: rgba(99,130,255,0.28);
      --text: #e8eaf6; --text2: #8892b0; --text3: #4a5568;
      --accent: #4f6ef7; --accent-dim: rgba(79,110,247,0.12);
      --green: #34d399; --yellow: #fbbf24; --red: #f87171;
    }
    html, body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; font-size: 14px; min-height: 100vh; }
    #gate { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; }
    .gate-mark { width: 40px; height: 4px; background: var(--accent); border-radius: 2px; margin: 0 auto 16px; }
    .gate-form { display: flex; gap: 8px; margin-top: 8px; }
    .gate-form input { background: var(--bg2); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-family: inherit; font-size: 14px; padding: 10px 14px; width: 220px; outline: none; }
    .gate-form button { background: var(--accent); border: none; border-radius: 6px; color: #fff; cursor: pointer; font-family: inherit; font-size: 13px; font-weight: 500; padding: 10px 18px; }
    .gate-error { font-size: 12px; color: var(--red); min-height: 16px; text-align: center; }
    #main { display: none; }
    .top-bar { display: flex; align-items: center; justify-content: space-between; padding: 16px 28px; border-bottom: 1px solid var(--border); }
    .top-left { display: flex; align-items: center; gap: 10px; }
    .top-mark { width: 22px; height: 3px; background: var(--accent); border-radius: 2px; }
    .top-name { font-size: 13px; font-weight: 500; }
    .top-sub { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; }
    .top-right { display: flex; gap: 8px; align-items: center; }
    .btn-ghost { background: none; border: 1px solid var(--border); border-radius: 6px; color: var(--text2); cursor: pointer; font-family: inherit; font-size: 12px; padding: 6px 14px; text-decoration: none; display: inline-flex; align-items: center; }
    .btn-ghost:hover { border-color: var(--border-hover); color: var(--text); }

    .content { padding: 28px 36px; max-width: 900px; }
    .week-nav { display: flex; align-items: center; gap: 16px; margin-bottom: 28px; }
    .week-btn { background: var(--bg2); border: 1px solid var(--border); border-radius: 6px; color: var(--text2); cursor: pointer; font-size: 18px; padding: 6px 14px; transition: border-color 0.15s; }
    .week-btn:hover { border-color: var(--border-hover); color: var(--text); }
    .week-label { font-size: 16px; font-weight: 600; flex: 1; }
    .week-sub { font-size: 12px; color: var(--text3); margin-top: 2px; }

    /* PROJECT CARD */
    .project-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 16px; }
    .project-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .project-name { font-size: 16px; font-weight: 600; }
    .progress-wrap { display: flex; align-items: center; gap: 10px; }
    .progress-bar { flex: 1; height: 6px; background: var(--bg3); border-radius: 3px; overflow: hidden; min-width: 100px; }
    .progress-fill { height: 100%; border-radius: 3px; transition: width 0.3s; }
    .progress-pct { font-size: 13px; font-weight: 600; }

    /* MEMBER ROW */
    .member-section { margin-bottom: 12px; }
    .member-header { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
    .member-avatar { width: 24px; height: 24px; border-radius: 50%; background: var(--accent-dim); border: 1px solid var(--accent); display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; color: var(--accent); flex-shrink: 0; }
    .member-name { font-size: 12px; font-weight: 600; color: var(--text2); }
    .member-count { font-size: 11px; color: var(--text3); }

    /* TASK LIST */
    .task-row { display: flex; align-items: center; gap: 10px; padding: 6px 8px; border-radius: 6px; margin-bottom: 3px; }
    .task-row:hover { background: var(--bg3); }
    .task-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .dot-todo { background: var(--accent); }
    .dot-progress { background: var(--yellow); }
    .dot-done { background: var(--green); }
    .dot-blocked { background: var(--red); }
    .task-name-text { font-size: 13px; color: var(--text2); flex: 1; }
    .task-name-text.done { text-decoration: line-through; color: var(--text3); }
    .task-status-badge { font-size: 10px; padding: 2px 7px; border-radius: 8px; font-weight: 500; white-space: nowrap; }
    .badge-todo { background: var(--accent-dim); color: var(--accent); }
    .badge-progress { background: rgba(251,191,36,0.15); color: var(--yellow); }
    .badge-done { background: rgba(52,211,153,0.15); color: var(--green); }
    .badge-blocked { background: rgba(248,113,113,0.1); color: var(--red); }
    .task-dates { font-size: 10px; color: var(--text3); white-space: nowrap; }

    .empty { text-align: center; padding: 48px; color: var(--text3); font-size: 13px; }
    .no-tasks { font-size: 12px; color: var(--text3); padding: 4px 8px; }
  
    [data-theme="light"] .modal-box,
    [data-theme="light"] .modal-bg { background: rgba(0,0,0,0.4); }
    [data-theme="light"] .modal-box { background: #fff; }
    [data-theme="light"] .btn-ghost { background: #fff; }
    [data-theme="light"] .top-bar { background: var(--bg2); }
    [data-theme="light"] .sidebar { background: var(--bg2); }
  </style>
</head>
<body>

<div id="gate">
  <div>
    <div class="gate-mark"></div>
    <div style="font-size:18px;font-weight:500;text-align:center;">Rena Omber</div>
    <div style="font-size:12px;color:var(--text3);letter-spacing:0.08em;text-transform:uppercase;text-align:center;margin-top:4px;">Goal Mingguan</div>
  </div>
  <div>
    <div class="gate-form">
      <input type="password" id="pw-input" placeholder="Password" onkeydown="if(event.key==='Enter')checkPw()" />
      <button onclick="checkPw()">Masuk</button>
    </div>
    <div class="gate-error" id="pw-error"></div>
  </div>
</div>

<div id="main">
  <div class="top-bar">
    <div class="top-left">
      <div class="top-mark"></div>
      <div>
        <div class="top-name">Rena Omber</div>
        <div class="top-sub">Goal Mingguan</div>
      </div>
    </div>
    <div class="top-right">
      <a href="timeline.html" class="btn-ghost">Gantt</a>
      <a href="index.html" class="btn-ghost">Vault</a>
      <button class="theme-toggle-btn btn-ghost" onclick="toggleTheme()" title="Mode Terang">☀️</button>
      <button class="btn-ghost" onclick="logout()">Keluar</button>
    </div>
  </div>
  <div class="content">
    <div class="week-nav">
      <button class="week-btn" onclick="shiftWeek(-1)">←</button>
      <div>
        <div class="week-label" id="week-label"></div>
        <div class="week-sub" id="week-sub"></div>
      </div>
      <button class="week-btn" onclick="shiftWeek(1)">→</button>
      <button class="btn-ghost" onclick="goToday()">Minggu Ini</button>
    </div>
    <div id="weekly-content"></div>
  </div>
</div>

<script>
  // ─── CONFIG ────────────────────────────────────────────────
  const SUPABASE_URL  = 'https://fqvfnohhilkzvijqukfg.supabase.co';
  const SUPABASE_ANON = 'YOUR_SUPABASE_ANON_KEY';
  const PASSWORD_HASH = '3f0e57f3e719957119f0ba621629a3ae0ed1ec95d1ad8a91bd980b2896b679e4';
  // ───────────────────────────────────────────────────────────

  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);
  const MEMBERS = ['rena','nom','gapl','pix','jee','tok'];
  const STATUS_LABEL = { todo:'To Do', progress:'In Progress', done:'Done', blocked:'Blocked' };
  let allProjects = [], allTasks = [];
  let weekOffset = 0;

  async function sha256(str) {
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
    return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
  }
  async function checkPw() {
    const val = document.getElementById('pw-input').value.trim();
    if ((await sha256(val)) === PASSWORD_HASH) {
      sessionStorage.setItem('ro_auth','1');
      await showMain();
    } else {
      document.getElementById('pw-error').textContent = 'Password salah.';
      document.getElementById('pw-input').value = '';
    }
  }
  function logout() { sessionStorage.removeItem('ro_auth'); location.reload(); }
  async function showMain() {
    document.getElementById('gate').style.display = 'none';
    document.getElementById('main').style.display = 'block';
    await loadAll();
    render();
  }
  if (sessionStorage.getItem('ro_auth') === '1') showMain();

  async function loadAll() {
    const [projRes, taskRes] = await Promise.all([
      sb.from('timeline_projects').select('*'),
      sb.from('timeline_tasks').select('*').order('sort_order')
    ]);
    allProjects = projRes.data||[];
    allTasks = taskRes.data||[];
  }

  function getWeekRange(offset) {
    const now = new Date();
    const day = now.getDay();
    const monday = new Date(now);
    monday.setDate(now.getDate() - (day===0?6:day-1) + offset*7);
    monday.setHours(0,0,0,0);
    const sunday = new Date(monday);
    sunday.setDate(monday.getDate() + 6);
    sunday.setHours(23,59,59,999);
    return { monday, sunday };
  }

  function parseD(str) {
    if (!str) return null;
    const [y,m,d] = str.split('-').map(Number);
    return new Date(y,m-1,d);
  }

  function fmt(d) {
    return d.toLocaleDateString('id-ID', { day:'numeric', month:'short' });
  }

  function shiftWeek(dir) { weekOffset += dir; render(); }
  function goToday() { weekOffset = 0; render(); }

  function render() {
    const { monday, sunday } = getWeekRange(weekOffset);
    const MONTHS = ['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agt','Sep','Okt','Nov','Des'];
    const DAYS = ['Min','Sen','Sel','Rab','Kam','Jum','Sab'];

    document.getElementById('week-label').textContent =
      `${fmt(monday)} — ${fmt(sunday)} ${sunday.getFullYear()}`;
    document.getElementById('week-sub').textContent =
      weekOffset === 0 ? 'Minggu ini' : weekOffset < 0 ? `${Math.abs(weekOffset)} minggu lalu` : `${weekOffset} minggu ke depan`;

    // Filter tasks active this week: overlap with [monday, sunday]
    const weekTasks = allTasks.filter(t => {
      const start = parseD(t.start_date);
      const end = parseD(t.end_date);
      return start && end && start <= sunday && end >= monday;
    });

    const el = document.getElementById('weekly-content');

    if (!weekTasks.length) {
      el.innerHTML = '<div class="empty">Tidak ada task aktif minggu ini.</div>';
      return;
    }

    // Group by project
    let html = '';
    allProjects.forEach(proj => {
      const projTasks = weekTasks.filter(t => t.project_id === proj.id);
      if (!projTasks.length) return;

      const total = projTasks.length;
      const done = projTasks.filter(t => (t.actual_status||t.status) === 'done').length;
      const pct = Math.round((done/total)*100);
      const color = pct >= 70 ? 'var(--green)' : pct >= 40 ? 'var(--yellow)' : 'var(--accent)';

      html += `<div class="project-card">
        <div class="project-header">
          <div class="project-name">${proj.name}</div>
          <div class="progress-wrap">
            <div class="progress-bar"><div class="progress-fill" style="width:${pct}%;background:${color};"></div></div>
            <div class="progress-pct" style="color:${color};">${done}/${total}</div>
          </div>
        </div>`;

      // Group by member
      const byMember = {};
      projTasks.forEach(t => {
        const m = t.assigned_to || 'unassigned';
        if (!byMember[m]) byMember[m] = [];
        byMember[m].push(t);
      });

      // Show assigned members first, then unassigned
      const orderedMembers = [...MEMBERS.filter(m => byMember[m]), ...(byMember['unassigned'] ? ['unassigned'] : [])];

      orderedMembers.forEach(member => {
        const tasks = byMember[member]||[];
        const mDone = tasks.filter(t=>(t.actual_status||t.status)==='done').length;
        const initial = member === 'unassigned' ? '?' : member[0].toUpperCase();

        html += `<div class="member-section">
          <div class="member-header">
            <div class="member-avatar">${initial}</div>
            <div class="member-name">${member === 'unassigned' ? 'Belum di-assign' : member}</div>
            <div class="member-count">${mDone}/${tasks.length} done</div>
          </div>`;

        tasks.forEach(t => {
          const status = t.actual_status || t.status || 'todo';
          const isDone = status === 'done';
          html += `<div class="task-row">
            <div class="task-dot dot-${status}"></div>
            <div class="task-name-text${isDone?' done':''}">${t.name}</div>
            <span class="task-status-badge badge-${status}">${STATUS_LABEL[status]}</span>
            <div class="task-dates">${t.start_date} → ${t.end_date}</div>
          </div>`;
        });

        html += `</div>`;
      });

      html += `</div>`;
    });

    if (!html) html = '<div class="empty">Tidak ada task aktif minggu ini.</div>';
    el.innerHTML = html;
  }
</script>
</body>
</html>
