<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rena Omber — Finance</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #060f0a; --bg2: #0d1f14; --bg3: #122b1a;
      --border: rgba(52,211,153,0.12); --border-hover: rgba(52,211,153,0.28);
      --text: #e6f4ec; --text2: #7aab90; --text3: #3d6b52;
      --accent: #34d399; --accent-dim: rgba(52,211,153,0.12);
      --red: #f87171; --red-dim: rgba(248,113,113,0.1);
      --yellow: #fbbf24;
    }
    html, body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; font-size: 14px; min-height: 100vh; }
    #gate { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; }
    .gate-mark { width: 40px; height: 4px; background: var(--accent); border-radius: 2px; margin: 0 auto 16px; }
    .gate-form { display: flex; gap: 8px; margin-top: 8px; }
    .gate-form input { background: var(--bg2); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-family: inherit; font-size: 14px; padding: 10px 14px; width: 220px; outline: none; }
    .gate-form button { background: var(--accent); border: none; border-radius: 6px; color: #fff; cursor: pointer; font-family: inherit; font-size: 13px; font-weight: 500; padding: 10px 18px; }
    .gate-error { font-size: 12px; color: var(--red); min-height: 16px; text-align: center; }
    #main { display: none; }
    .top-bar { display: flex; align-items: center; justify-content: space-between; padding: 16px 28px; border-bottom: 1px solid var(--border); }
    .top-left { display: flex; align-items: center; gap: 10px; }
    .top-mark { width: 22px; height: 3px; background: var(--accent); border-radius: 2px; }
    .top-name { font-size: 13px; font-weight: 500; }
    .top-sub { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; }
    .top-right { display: flex; gap: 8px; }
    .btn-ghost { background: none; border: 1px solid var(--border); border-radius: 6px; color: var(--text2); cursor: pointer; font-family: inherit; font-size: 12px; padding: 6px 14px; text-decoration: none; display: inline-flex; align-items: center; transition: border-color 0.15s; }
    .btn-ghost:hover { border-color: var(--border-hover); color: var(--text); }

    .layout { display: grid; grid-template-columns: 220px 1fr; min-height: calc(100vh - 53px); }

    /* SIDEBAR */
    .sidebar { border-right: 1px solid var(--border); padding: 20px 0; }
    .sidebar-label { font-size: 10px; color: var(--text3); letter-spacing: 0.1em; text-transform: uppercase; padding: 0 16px; margin-bottom: 8px; }
    .batch-item { display: flex; align-items: center; justify-content: space-between; padding: 8px 16px; cursor: pointer; border-left: 2px solid transparent; font-size: 13px; color: var(--text2); transition: background 0.1s; }
    .batch-item:hover { background: var(--bg2); color: var(--text); }
    .batch-item.active { border-left-color: var(--accent); background: var(--bg2); color: var(--text); font-weight: 500; }
    .batch-item-sub { font-size: 11px; color: var(--text3); margin-top: 1px; }
    .sidebar-divider { height: 1px; background: var(--border); margin: 12px 0; }

    /* CONTENT */
    .content { padding: 28px 36px; overflow-y: auto; }
    .content-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
    .content-title { font-size: 20px; font-weight: 600; }
    .content-sub { font-size: 12px; color: var(--text3); margin-top: 3px; }

    /* SUMMARY CARDS */
    .summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-bottom: 28px; }
    .summary-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 16px 18px; }
    .summary-label { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; }
    .summary-value { font-size: 20px; font-weight: 600; }
    .summary-value.green { color: var(--accent); }
    .summary-value.red { color: var(--red); }
    .summary-value.yellow { color: var(--yellow); }

    /* REVENUE INPUT */
    .section-title { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 12px; }
    .revenue-table { width: 100%; border-collapse: collapse; margin-bottom: 24px; }
    .revenue-table th { font-size: 11px; color: var(--text3); font-weight: 500; text-align: left; padding: 8px 12px; border-bottom: 1px solid var(--border); }
    .revenue-table th.right { text-align: right; }
    .revenue-table td { padding: 10px 12px; border-bottom: 1px solid var(--border); font-size: 13px; }
    .revenue-table td.right { text-align: right; }
    .revenue-table .total-row td { font-weight: 600; color: var(--text); border-top: 2px solid var(--border); border-bottom: none; }
    .revenue-input { background: var(--bg3); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-family: inherit; font-size: 13px; padding: 6px 10px; width: 130px; text-align: right; outline: none; }
    .revenue-input:focus { border-color: var(--border-hover); }
    .profit-positive { color: var(--accent); font-weight: 600; }
    .profit-negative { color: var(--red); font-weight: 600; }
    .margin-badge { font-size: 11px; padding: 2px 7px; border-radius: 10px; font-weight: 500; }
    .margin-pos { background: var(--accent-dim); color: var(--accent); }
    .margin-neg { background: var(--red-dim); color: var(--red); }

    .empty { text-align: center; padding: 60px 20px; color: var(--text3); font-size: 13px; }
    .placeholder { display: flex; flex-direction: column; align-items: center; justify-content: center; height: calc(100vh - 53px); color: var(--text3); gap: 10px; font-size: 13px; }
  </style>
</head>
<body>

<div id="gate">
  <div>
    <div class="gate-mark"></div>
    <div style="font-size:18px;font-weight:500;text-align:center;">Rena Omber</div>
    <div style="font-size:12px;color:var(--text3);letter-spacing:0.08em;text-transform:uppercase;text-align:center;margin-top:4px;">Finance</div>
  </div>
  <div>
    <div class="gate-form">
      <input type="password" id="pw-input" placeholder="Password" onkeydown="if(event.key==='Enter')checkPw()" />
      <button onclick="checkPw()">Masuk</button>
    </div>
    <div class="gate-error" id="pw-error"></div>
  </div>
</div>

<div id="main">
  <div class="top-bar">
    <div class="top-left">
      <div class="top-mark"></div>
      <div>
        <div class="top-name">Rena Omber</div>
        <div class="top-sub">Finance</div>
      </div>
    </div>
    <div class="top-right">
      <a href="biaya.html" class="btn-ghost">Biaya Produk</a>
      <a href="produk.html" class="btn-ghost">Produk</a>
      <a href="index.html" class="btn-ghost">Vault</a>
      <button class="btn-ghost" onclick="logout()">Keluar</button>
    </div>
  </div>
  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-label">Semua Batch</div>
      <div id="sidebar-batches"></div>
    </aside>
    <main class="content" id="content">
      <div class="placeholder">Pilih batch di sidebar</div>
    </main>
  </div>
</div>

<script>
  // ─── CONFIG ────────────────────────────────────────────────
  const SUPABASE_URL  = 'https://fqvfnohhilkzvijqukfg.supabase.co';
  const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZxdmZub2hoaWxrenZpanF1a2ZnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI1NDU4NjAsImV4cCI6MjA5ODEyMTg2MH0.er10SEsmDlnx1yRLGJK2fKtLhQR40vFOXVJzH9yakCg';
  const PASSWORD_HASH = '3f0e57f3e719957119f0ba621629a3ae0ed1ec95d1ad8a91bd980b2896b679e4';
  // ───────────────────────────────────────────────────────────

  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);
  const SIZES = ['S','M','L','XL','XXL'];
  let allProducts = [], allVendors = [], financeData = {};
  let activeBatchKey = null;

  async function sha256(str) {
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
    return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
  }
  async function checkPw() {
    const val = document.getElementById('pw-input').value.trim();
    if ((await sha256(val)) === PASSWORD_HASH) {
      sessionStorage.setItem('ro_auth','1');
      await showMain();
    } else {
      document.getElementById('pw-error').textContent = 'Password salah.';
      document.getElementById('pw-input').value = '';
    }
  }
  function logout() { sessionStorage.removeItem('ro_auth'); location.reload(); }
  async function showMain() {
    document.getElementById('gate').style.display = 'none';
    document.getElementById('main').style.display = 'block';
    await loadAll();
  }
  if (sessionStorage.getItem('ro_auth') === '1') showMain();

  async function loadAll() {
    const [prodRes, vendorRes, finRes] = await Promise.all([
      sb.from('products').select('*').order('created_at'),
      sb.from('vendors').select('*'),
      sb.from('finance_entries').select('*')
    ]);
    allProducts = (prodRes.data||[]).map(r => ({ id: String(r.id), name: r.name, batches: r.data?.batches||[] }));
    allVendors = vendorRes.data||[];
    financeData = {};
    (finRes.data||[]).forEach(r => { financeData[r.batch_key] = r; });
    renderSidebar();
  }

  function fmt(n) { return 'Rp ' + Math.round(n||0).toLocaleString('id-ID'); }

  function artikelUnits(a) { return SIZES.reduce((s,sz)=>s+(parseInt(a.sizes[sz])||0),0); }

  function getVendorKaosPrice(vendorId, tebalKain, potongan) {
    const v = allVendors.find(v=>v.id===vendorId);
    if (!v||v.type!=='kaos') return 0;
    const entry = v.data?.matrix?.[tebalKain];
    if (!entry) return 0;
    if (potongan==='oversized') return entry.oversized||entry.regular||0;
    if (potongan==='longsleeve') return entry.longsleeve||entry.regular||0;
    return entry.regular||0;
  }

  function getVendorPrice(id) { const v = allVendors.find(v=>v.id===id); return v?(v.price_per_unit||0):0; }

  function artikelCOGS(a) {
    const kaosPrice = getVendorKaosPrice(a.vendorKaos, a.tebalKain, a.potongan);
    const jw = parseInt(a.jumlahWarna)||1;
    const vk = allVendors.find(v=>v.id===a.vendorKaos);
    const bc = vk?.data?.baseColors||4;
    const cc = vk?.data?.colorCharge||0;
    const extraWarna = jw > bc ? (jw-bc)*cc : 0;
    return kaosPrice + extraWarna + getVendorPrice(a.vendorHangtag) + getVendorPrice(a.vendorPackaging);
  }

  function renderSidebar() {
    const el = document.getElementById('sidebar-batches');
    el.innerHTML = '';
    allProducts.forEach(p => {
      p.batches.forEach((b,bi) => {
        const key = `${p.id}_${bi}`;
        const totalUnits = b.artikels.reduce((s,a)=>s+artikelUnits(a),0);
        const div = document.createElement('div');
        div.className = 'batch-item' + (key===activeBatchKey?' active':'');
        div.innerHTML = `<div><div>${p.name}</div><div class="batch-item-sub">${b.name} · ${totalUnits} unit</div></div>`;
        div.onclick = () => selectBatch(p.id, bi, key);
        el.appendChild(div);
      });
    });
    if (!el.children.length) el.innerHTML = '<div style="padding:12px 16px;font-size:12px;color:var(--text3);">Belum ada batch.</div>';
  }

  function selectBatch(prodId, batchIdx, key) {
    activeBatchKey = key;
    renderSidebar();
    const p = allProducts.find(p=>p.id===prodId);
    const b = p.batches[batchIdx];
    renderBatch(p, b, key);
  }

  async function renderBatch(p, b, key) {
    const fd = financeData[key] || { harga_jual: {}, terjual: {}, other_cost: 0, notes: '' };
    const content = document.getElementById('content');

    // Calculate COGS per artikel
    const artikelRows = b.artikels.map(a => {
      const units = artikelUnits(a);
      const cogs = artikelCOGS(a);
      const hjual = parseInt(fd.harga_jual?.[a.name])||0;
      const terjual = parseInt(fd.terjual?.[a.name])||0;
      const revenue = hjual * terjual;
      const totalCOGS = cogs * terjual;
      const profit = revenue - totalCOGS;
      const margin = revenue ? Math.round((profit/revenue)*100) : null;
      return { a, units, cogs, hjual, terjual, revenue, totalCOGS, profit, margin };
    });

    const totalRevenue = artikelRows.reduce((s,r)=>s+r.revenue,0);
    const totalCOGS = artikelRows.reduce((s,r)=>s+r.totalCOGS,0);
    const otherCost = parseInt(fd.other_cost)||0;
    const totalProfit = totalRevenue - totalCOGS - otherCost;
    const totalMargin = totalRevenue ? Math.round((totalProfit/totalRevenue)*100) : null;
    const totalTerjual = artikelRows.reduce((s,r)=>s+r.terjual,0);
    const totalUnit = artikelRows.reduce((s,r)=>s+r.units,0);

    content.innerHTML = `
      <div class="content-header">
        <div>
          <div class="content-title">${p.name} — ${b.name}</div>
          <div class="content-sub">${totalUnit} unit diproduksi · ${totalTerjual} terjual</div>
        </div>
      </div>

      <div class="summary-grid">
        <div class="summary-card">
          <div class="summary-label">Revenue</div>
          <div class="summary-value green">${fmt(totalRevenue)}</div>
        </div>
        <div class="summary-card">
          <div class="summary-label">COGS</div>
          <div class="summary-value red">${fmt(totalCOGS)}</div>
        </div>
        <div class="summary-card">
          <div class="summary-label">Biaya Lain</div>
          <div class="summary-value yellow">${fmt(otherCost)}</div>
        </div>
        <div class="summary-card">
          <div class="summary-label">Net Profit</div>
          <div class="summary-value ${totalProfit>=0?'green':'red'}">${fmt(totalProfit)}</div>
        </div>
        <div class="summary-card">
          <div class="summary-label">Margin</div>
          <div class="summary-value ${totalMargin===null?'':totalMargin>=0?'green':'red'}">${totalMargin===null?'—':totalMargin+'%'}</div>
        </div>
      </div>

      <div class="section-title">Input Revenue per Artikel</div>
      <table class="revenue-table">
        <thead>
          <tr>
            <th>Artikel</th>
            <th class="right">COGS/unit</th>
            <th class="right">Harga Jual</th>
            <th class="right">Unit Diproduksi</th>
            <th class="right">Unit Terjual</th>
            <th class="right">Revenue</th>
            <th class="right">Profit</th>
            <th class="right">Margin</th>
          </tr>
        </thead>
        <tbody>
          ${artikelRows.map(r => `
            <tr>
              <td style="font-weight:500;">${r.a.name}</td>
              <td class="right" style="color:var(--text2);">${fmt(r.cogs)}</td>
              <td class="right">
                <input type="number" class="revenue-input" placeholder="0" value="${r.hjual||''}"
                  onchange="updateRevenue('${key}','harga_jual','${r.a.name}',this.value)" />
              </td>
              <td class="right" style="color:var(--text2);">${r.units}</td>
              <td class="right">
                <input type="number" class="revenue-input" placeholder="0" value="${r.terjual||''}" min="0" max="${r.units}"
                  onchange="updateRevenue('${key}','terjual','${r.a.name}',this.value)" />
              </td>
              <td class="right">${r.revenue ? fmt(r.revenue) : '—'}</td>
              <td class="right ${r.profit>=0?'profit-positive':'profit-negative'}">${r.revenue ? fmt(r.profit) : '—'}</td>
              <td class="right">${r.margin!==null?`<span class="margin-badge ${r.margin>=0?'margin-pos':'margin-neg'}">${r.margin}%</span>`:'—'}</td>
            </tr>`).join('')}
        </tbody>
        <tfoot>
          <tr class="total-row">
            <td>Total</td>
            <td></td>
            <td></td>
            <td class="right">${totalUnit}</td>
            <td class="right">${totalTerjual}</td>
            <td class="right ${totalRevenue?'profit-positive':''}">${fmt(totalRevenue)}</td>
            <td class="right ${totalProfit>=0?'profit-positive':'profit-negative'}">${fmt(totalProfit)}</td>
            <td class="right">${totalMargin!==null?`<span class="margin-badge ${totalMargin>=0?'margin-pos':'margin-neg'}">${totalMargin}%</span>`:'—'}</td>
          </tr>
        </tfoot>
      </table>

      <div class="section-title">Biaya Lain-lain</div>
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:24px;">
        <div style="position:relative;">
          <span style="position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:12px;color:var(--text3);">Rp</span>
          <input type="number" class="revenue-input" style="padding-left:28px;width:180px;" placeholder="0" value="${otherCost||''}"
            onchange="updateOtherCost('${key}',this.value)" />
        </div>
        <span style="font-size:12px;color:var(--text3);">Contoh: ongkir, fee marketplace, dll</span>
      </div>

      <div class="section-title">Catatan</div>
      <textarea style="width:100%;max-width:500px;background:var(--bg2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:inherit;font-size:13px;padding:10px 12px;outline:none;resize:vertical;min-height:72px;line-height:1.6;"
        placeholder="Catatan batch ini..." onchange="updateNotes('${key}',this.value)">${fd.notes||''}</textarea>`;
  }

  let saveTimer = null;
  async function saveFinance(key) {
    const fd = financeData[key];
    await sb.from('finance_entries').upsert({
      batch_key: key,
      harga_jual: fd.harga_jual||{},
      terjual: fd.terjual||{},
      other_cost: fd.other_cost||0,
      notes: fd.notes||'',
      updated_at: new Date().toISOString()
    });
  }

  function scheduleSave(key) {
    clearTimeout(saveTimer);
    saveTimer = setTimeout(() => saveFinance(key), 800);
  }

  function updateRevenue(key, field, artikelName, val) {
    if (!financeData[key]) financeData[key] = { harga_jual:{}, terjual:{}, other_cost:0, notes:'' };
    if (!financeData[key][field]) financeData[key][field] = {};
    financeData[key][field][artikelName] = parseInt(val)||0;
    scheduleSave(key);
    // Re-render summaries without re-building whole page
    const p = allProducts.find(p => p.batches.some((_,i) => `${p.id}_${i}` === key));
    const bIdx = p.batches.findIndex((_,i) => `${p.id}_${i}` === key);
    renderBatch(p, p.batches[bIdx], key);
  }

  function updateOtherCost(key, val) {
    if (!financeData[key]) financeData[key] = { harga_jual:{}, terjual:{}, other_cost:0, notes:'' };
    financeData[key].other_cost = parseInt(val)||0;
    scheduleSave(key);
    const p = allProducts.find(p => p.batches.some((_,i) => `${p.id}_${i}` === key));
    const bIdx = p.batches.findIndex((_,i) => `${p.id}_${i}` === key);
    renderBatch(p, p.batches[bIdx], key);
  }

  function updateNotes(key, val) {
    if (!financeData[key]) financeData[key] = { harga_jual:{}, terjual:{}, other_cost:0, notes:'' };
    financeData[key].notes = val;
    scheduleSave(key);
  }
</script>
</body>
</html>
